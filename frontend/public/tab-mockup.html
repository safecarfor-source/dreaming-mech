<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하단 탭바 배경색 비교</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#e5e7eb; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; padding:20px; }
h1 { text-align:center; font-size:20px; margin-bottom:24px; color:#111; }
.grid { display:grid; grid-template-columns:1fr; gap:24px; max-width:420px; margin:0 auto; }
.option { border-radius:16px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.1); }
.option-label { padding:12px 16px; font-size:15px; font-weight:700; color:#333; background:#fff; border-bottom:1px solid #eee; }
.tab-bar { display:flex; justify-content:space-around; align-items:center; height:68px; padding:8px 4px 12px; }
.tab-item { display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; cursor:pointer; color:#9CA3AF; }
.tab-item.active { color:#E4015C; }
.tab-item.active .tab-label { font-weight:700; }
.tab-icon { font-size:20px; line-height:1; }
.tab-label { font-size:11px; font-weight:500; }

.opt1 .tab-bar { background:#F9F6F0; border-top:1px solid #EDE8E0; }
.opt2 .tab-bar { background:#F5F0EB; border-top:1px solid #E8E0D8; }
.opt3 .tab-bar { background:#FFFFFF; border-top:1px solid #e5e7eb; box-shadow:0 -2px 8px rgba(0,0,0,0.06); }
</style>
</head>
<body>
<h1>하단 탭바 배경색 비교 (활성=핑크)</h1>
<div class="grid">

<div class="option opt1">
<div class="option-label">1안 — 연한 아이보리 (#F9F6F0) 따뜻하고 고급스러움</div>
<div class="tab-bar">
<div class="tab-item active"><span class="tab-icon">🏠</span><span class="tab-label">홈</span></div>
<div class="tab-item"><span class="tab-icon">🔍</span><span class="tab-label">정비소 찾기</span></div>
<div class="tab-item"><span class="tab-icon">📞</span><span class="tab-label">문의하기</span></div>
<div class="tab-item"><span class="tab-icon">👤</span><span class="tab-label">내 정보</span></div>
</div>
</div>

<div class="option opt2">
<div class="option-label">3안 — 연한 베이지 (#F5F0EB) 자연스럽고 눈 편함</div>
<div class="tab-bar">
<div class="tab-item active"><span class="tab-icon">🏠</span><span class="tab-label">홈</span></div>
<div class="tab-item"><span class="tab-icon">🔍</span><span class="tab-label">정비소 찾기</span></div>
<div class="tab-item"><span class="tab-icon">📞</span><span class="tab-label">문의하기</span></div>
<div class="tab-item"><span class="tab-icon">👤</span><span class="tab-label">내 정보</span></div>
</div>
</div>

<div class="option opt3">
<div class="option-label">4안 — 순백 (#FFFFFF) + 상단 그림자 깔끔</div>
<div class="tab-bar">
<div class="tab-item active"><span class="tab-icon">🏠</span><span class="tab-label">홈</span></div>
<div class="tab-item"><span class="tab-icon">🔍</span><span class="tab-label">정비소 찾기</span></div>
<div class="tab-item"><span class="tab-icon">📞</span><span class="tab-label">문의하기</span></div>
<div class="tab-item"><span class="tab-icon">👤</span><span class="tab-label">내 정보</span></div>
</div>
</div>

</div>
</body>
</html>
