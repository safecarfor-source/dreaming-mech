  } catch (e) { alert('변경 실패: ' + e.message); }
}

// ===== 매핑 관리 =====
const CAT_LABELS = {...ITEM_LABELS, tire:'타이어', alignment:'얼라이먼트'};

async function loadMappings() {
  const el = document.getElementById('mappingTable');
  if (!el) return;
  try {
    const mappings = await api('/mapping');
    if (!mappings || mappings.length === 0) { el.innerHTML = '<p style="font-size:13px;color:var(--text-muted)">등록된 매핑 없음</p>'; return; }
    let h = `<div style="overflow-x:auto"><table class="data-table" style="font-size:12px"><thead><tr>
      <th>코드</th><th>매칭방식</th><th>카테고리</th><th>인센티브</th><th>작업</th></tr></thead><tbody>`;
    mappings.forEach(m => {
      h += `<tr>
        <td><code style="background:var(--border);padding:2px 6px;border-radius:4px">${m.code}</code></td>
        <td style="font-size:11px">${m.isPrefix ? '접두어' : '정확'}</td>
        <td><span style="background:${m.isIncentive?'#EBF5FF':'#F0F0F0'};color:${m.isIncentive?'#2563EB':'var(--text-light)'};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">${CAT_LABELS[m.category]||m.category}</span></td>
        <td style="text-align:center">${m.isIncentive ? '<span style="color:var(--green)">O</span>' : '<span style="color:var(--text-light)">-</span>'}</td>
        <td><button class="btn-save" style="background:#FF6B6B;font-size:11px;padding:3px 8px" onclick="deleteMapping('${m.id}','${m.code}')">삭제</button></td>
      </tr>`;
    });
    h += '</tbody></table></div>';
    h += `<p style="font-size:11px;color:var(--text-light);margin-top:4px">총 ${mappings.length}개 매핑</p>`;
    el.innerHTML = h;
  } catch (e) { el.innerHTML = '<p style="font-size:13px;color:var(--red)">매핑 로드 실패</p>'; }
}

async function addMapping() {
  const code = document.getElementById('newMapCode').value.trim();
  const category = document.getElementById('newMapCategory').value;
  const isPrefix = document.getElementById('newMapPrefix').checked;
  const isIncentive = document.getElementById('newMapIncentive').checked;
  if (!code || !category) { alert('상품코드와 카테고리를 입력하세요'); return; }
  const label = CAT_LABELS[category] || category;
  try {
    await api('/mapping', { method: 'POST', body: JSON.stringify({ code, isPrefix, category, label, isIncentive }) });
    document.getElementById('newMapCode').value = '';
    loadMappings();
  } catch (e) { alert('매핑 추가 실패: ' + e.message); }
}

async function deleteMapping(id, code) {
  if (!confirm(`매핑 "${code}"을(를) 삭제하시겠습니까?`)) return;
  try {
    await api('/mapping/' + id, { method: 'DELETE' });
    loadMappings();
  } catch (e) { alert('삭제 실패: ' + e.message); }
}

// ===== 전월 목표 복사 =====
async function copyPrevTargets() {
  const raw = document.getElementById('minQtyMonth').value;
  if (!raw) { alert('대상 월을 선택하세요'); return; }
  const [y, m] = raw.split('-');
  const prevDate = new Date(Number(y), Number(m) - 2, 1);
  const prevIso = prevDate.getFullYear() + '-' + String(prevDate.getMonth()+1).padStart(2,'0');
  const prevMonth = toKrMonth(prevIso);
  try {
    const resp = await api('/team/item-qty-history');
    const allTargets = resp.targets || {};
    const prev = allTargets[prevMonth] || {};
    if (Object.keys(prev).length === 0 || !Object.values(prev).some(v => v > 0)) { alert(prevMonth + ' 설정된 최소수량이 없습니다'); return; }
    Object.keys(ITEM_LABELS).forEach(key => {
      const input = document.getElementById('minqty-' + key);
      if (input && prev[key]) input.value = prev[key];
    });
    const resultEl = document.getElementById('minQtyResult');
    if (resultEl) resultEl.innerHTML = `<span style="color:var(--purple);font-size:13px;font-weight:600">${prevMonth} 데이터를 복사했습니다. 저장 버튼을 눌러주세요.</span>`;
  } catch (e) { alert('전월 데이터 로드 실패: ' + e.message); }
}

function showChangePw() {
  document.getElementById('pwModal').style.display = 'flex';
  document.getElementById('pwCurrent').value = '';
  document.getElementById('pwNew').value = '';
  document.getElementById('pwConfirm').value = '';
  document.getElementById('pwError').textContent = '';
}
function closePwModal() { document.getElementById('pwModal').style.display = 'none'; }
async function doChangePw() {
  const cur = document.getElementById('pwCurrent').value;
  const nw = document.getElementById('pwNew').value;
  const cf = document.getElementById('pwConfirm').value;
  const err = document.getElementById('pwError');
  if (!cur || !nw || !cf) { err.textContent = '모든 항목을 입력하세요'; return; }
  if (nw !== cf) { err.textContent = '새 비밀번호가 일치하지 않습니다'; return; }
  if (nw.length < 4) { err.textContent = '비밀번호는 4자 이상이어야 합니다'; return; }
  try {
    await api('/auth/change-password', { method: 'PUT', body: JSON.stringify({ currentPassword: cur, newPassword: nw }) });
    alert('비밀번호가 변경되었습니다. 다시 로그인해주세요.');
    closePwModal(); doLogout();
  } catch (e) { err.textContent = e.message.includes('401') ? '현재 비밀번호가 올바르지 않습니다' : '변경 실패'; }
}

document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginId').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPw').focus(); });

if (token) { initApp(); }
</script>
