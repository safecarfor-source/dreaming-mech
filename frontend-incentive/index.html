<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인센티브 현황판 - 꿈꾸는 정비사</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap">
<style>
:root {
  --bg: #F5F5F0;
  --card: #ffffff;
  --text: #2C2C2A;
  --text-muted: #888780;
  --text-light: #B4B2A9;
  --border: #E8E6DF;
  --purple: #7C3AED;
  --purple-light: #F3F0FF;
  --teal: #1D9E75;
  --teal-light: #E1F5EE;
  --blue: #378ADD;
  --blue-light: #E6F1FB;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --red: #E24B4A;
  --red-light: #FCEBEB;
  --green: #1D9E75;
  --green-light: #E1F5EE;
  --shadow: none;
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* --- Login --- */
.login-page {
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 24px; background: var(--bg);
}
.login-box {
  background: var(--card); border-radius: 16px; padding: 48px 32px;
  width: 100%; max-width: 400px; box-shadow: var(--shadow-md); text-align: center;
}
.login-box h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.login-box .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
.login-box input {
  width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px;
  font-size: 15px; font-family: inherit; margin-bottom: 12px; outline: none; transition: border-color 0.2s;
  background: #FAFAFA;
}
.login-box input:focus { border-color: var(--purple); background: #fff; }
.login-box button {
  width: 100%; padding: 14px; background: var(--purple); color: #fff; border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 8px; transition: opacity 0.2s;
}
.login-box button:hover { opacity: 0.9; }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 20px; }

/* --- App Shell --- */
.app { display: none; }
.app.active { display: block; }

/* --- Top Bar --- */
.top-bar {
  display: flex; align-items: center; padding: 0 20px;
  background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
  gap: 0; height: 52px;
}
.top-bar .logo { font-size: 16px; font-weight: 800; color: var(--purple); white-space: nowrap; margin-right: 8px; flex-shrink: 0; }
.top-bar .user-info { display: flex; align-items: center; gap: 10px; font-size: 14px; }
.top-bar .user-info .name { font-weight: 600; color: var(--text); }
.top-bar .user-info .role-badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.role-admin { background: var(--purple-light); color: var(--purple); }
.role-manager { background: var(--blue-light); color: var(--blue); }
.role-director { background: var(--teal-light); color: var(--teal); }
.role-viewer { background: #f0f0ec; color: var(--text-muted); }
.btn-outline {
  padding: 6px 14px; background: none; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; font-family: inherit; cursor: pointer; color: var(--text-muted); white-space: nowrap;
}
.btn-outline:hover { background: var(--red-light); color: var(--red); border-color: var(--red); }

/* Hamburger */
.hamburger {
  display: none; background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px 8px;
  color: var(--text); line-height: 1;
}
.mobile-dropdown {
  display: none; position: absolute; top: 100%; right: 16px; background: var(--card);
  border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); padding: 8px 0; min-width: 180px; z-index: 200;
}
.mobile-dropdown.open { display: block; }
.mobile-dropdown button {
  display: block; width: 100%; text-align: left; padding: 12px 20px; background: none; border: none;
  font-size: 14px; font-family: inherit; cursor: pointer; color: var(--text);
}
.mobile-dropdown button:hover { background: #f5f5f5; }
.mobile-dropdown .dd-info {
  padding: 12px 20px; font-size: 13px; color: var(--text-muted); border-bottom: 1px solid var(--border);
}

/* --- Tabs (inline in top-bar) --- */
.tab-bar {
  display: none; /* hidden, tabs rendered inside top-bar */
}
.inline-tabs {
  display: flex; gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; flex: 1; min-width: 0;
}
.inline-tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 0 14px; font-size: 13px; font-weight: 500; font-family: inherit; color: var(--text-muted);
  background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: all 0.2s;
  height: 52px; line-height: 52px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); font-weight: 700; }

/* --- Content --- */
.content { padding: 20px; max-width: 1200px; margin: 0 auto; }
.tab-content { display: none; }
.tab-content.active { display: block; max-width: 520px; margin: 0 auto; }

/* --- Cards --- */
.card { background: var(--card); border-radius: 12px; padding: 20px; border: 0.5px solid var(--border); margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; }

/* --- Stat Grid (YouTube Studio style) --- */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.stat-grid-full { grid-column: 1 / -1; }
.stat-card {
  background: var(--card); border-radius: 12px; padding: 20px; border: 0.5px solid var(--border); text-align: left;
}
.stat-card .label { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; }
.stat-card .value { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
.stat-card .sub { font-size: 12px; color: var(--text-light); margin-top: 4px; }
.text-purple { color: var(--purple); }
.text-teal { color: var(--teal); }
.text-red { color: var(--red); }
.text-blue { color: var(--blue); }
.text-amber { color: var(--amber); }
.text-green { color: var(--green); }

/* --- Loss/OK Banner --- */
.loss-banner { background: #FCEBEB; border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 12px; }
.loss-banner .loss-label { font-size: 13px; font-weight: 600; color: #E24B4A; margin-bottom: 4px; }
.loss-banner .loss-amount { font-size: 28px; font-weight: 800; color: #E24B4A; }
.ok-banner { background: #E1F5EE; border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 12px; }
.ok-banner .ok-label { font-size: 13px; font-weight: 600; color: #1D9E75; }
.ok-banner .ok-amount { font-size: 28px; font-weight: 800; color: #1D9E75; }

/* --- YouTube Studio Arrow --- */
.yt-arrow { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; color: #fff; vertical-align: middle; margin-right: 4px; line-height: 1; }
.yt-arrow.up { background: #1D9E75; }
.yt-arrow.down { background: #888780; }

/* --- Metric Card Grid --- */
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.metric-card { background: #fff; border: 0.5px solid #E8E6DF; border-radius: 12px; padding: 16px; }
.metric-card .mc-label { font-size: 12px; color: #888780; margin-bottom: 6px; font-weight: 500; }
.metric-card .mc-value { font-size: 20px; font-weight: 800; color: #2C2C2A; }
.metric-card .mc-sub { font-size: 11px; color: #B4B2A9; margin-top: 4px; }

/* --- Min Qty Progress --- */
.mqp-item { margin-bottom: 14px; }
.mqp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.mqp-name { font-size: 14px; font-weight: 600; color: #2C2C2A; }
.mqp-count { font-size: 13px; font-weight: 600; }
.mqp-bar-wrap { position: relative; height: 12px; background: #F0EFEA; border-radius: 6px; overflow: visible; }
.mqp-bar { height: 100%; border-radius: 6px; transition: width 0.6s ease; }
.mqp-target-line { position: absolute; top: -3px; bottom: -3px; width: 1.5px; border-left: 1.5px dashed #888780; }
.mqp-action { font-size: 12px; color: #888780; margin-top: 4px; }

/* --- Donut Gauge Grid --- */
.donut-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.donut-card { background: #fff; border: 0.5px solid #E8E6DF; border-radius: 12px; padding: 16px 12px; text-align: center; }
.donut-wrap { position: relative; width: 90px; height: 90px; margin: 0 auto 8px; }
.donut-wrap svg { transform: rotate(-90deg); }
.donut-wrap .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; line-height: 1.2; }
.donut-center .donut-pct { font-size: 18px; font-weight: 800; }
.donut-center .donut-sub { font-size: 9px; color: #888780; font-weight: 500; }
.donut-name { font-size: 13px; font-weight: 700; color: #2C2C2A; margin-bottom: 2px; }
.donut-inc { font-size: 16px; font-weight: 800; color: #7C3AED; margin-bottom: 2px; }
.donut-status { font-size: 11px; font-weight: 500; }

/* --- Item Cards (mobile) --- */
.item-card-list { display: none; }
.item-card {
  background: var(--card); border-radius: 12px; padding: 16px; border: 0.5px solid var(--border); margin-bottom: 8px;
}
.item-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.item-card-name { font-size: 16px; font-weight: 600; color: var(--text); }
.item-card-rate { font-size: 13px; color: var(--text-muted); }
.item-card-mid { font-size: 14px; color: #666; margin-bottom: 8px; }
.item-card-bottom { display: flex; justify-content: space-between; align-items: center; }
.item-card-inc-label { font-size: 13px; color: var(--text-muted); }
.item-card-inc-value { font-size: 20px; font-weight: 700; color: var(--purple); }
.item-card.inactive { background: #FAFAFA; }
.item-card.inactive .item-card-inc-value { color: #CCCCCC; }
.zero-toggle {
  display: block; width: 100%; text-align: center; padding: 12px; font-size: 13px; color: var(--text-muted);
  background: none; border: 1px dashed var(--border); border-radius: 10px; cursor: pointer; font-family: inherit;
  margin-bottom: 8px;
}
.zero-toggle:hover { background: #fafafa; }

/* --- Table (desktop) --- */
.desktop-table { display: block; }
.data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.data-table th { text-align: left; padding: 10px 12px; font-weight: 600; font-size: 12px; color: var(--text-muted); border-bottom: 2px solid var(--border); }
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.data-table tr:last-child td { border-bottom: none; }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.data-table .met { color: var(--green); font-weight: 600; }
.data-table .unmet { color: var(--red); font-weight: 600; }

/* --- Progress bar --- */
.progress-wrap { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-top: 6px; }
.progress-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

/* --- Chart --- */
.chart-wrap { position: relative; height: 320px; min-height: 200px; margin-top: 8px; }
.chart-wrap canvas { width: 100% !important; }

/* --- Summary Footer --- */
.summary-footer {
  background: var(--purple); border-radius: 16px; padding: 16px 20px; margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center; color: #fff;
}
.summary-footer .sf-item { text-align: center; flex: 1; }
.summary-footer .sf-label { font-size: 12px; opacity: 0.8; margin-bottom: 2px; }
.summary-footer .sf-value { font-size: 18px; font-weight: 700; }
.summary-footer .sf-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.25); }

/* --- Month Selector --- */
.month-sel { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.month-sel label { font-size: 14px; font-weight: 600; color: var(--text-muted); }
.month-sel select {
  padding: 8px 14px; border: 0.5px solid var(--border); border-radius: 10px; font-size: 14px;
  font-family: inherit; background: var(--card); cursor: pointer;
}

/* --- Admin --- */
.admin-section { margin-bottom: 32px; }
.admin-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--purple); }
.config-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.config-row:last-child { border-bottom: none; }
.config-row .config-label { font-size: 14px; flex: 1; }
.config-row input { width: 120px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; text-align: right; font-family: inherit; }
.btn-save { padding: 6px 16px; background: var(--purple); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-family: inherit; cursor: pointer; margin-left: 8px; }
.btn-save:hover { opacity: 0.9; }

/* --- Upload --- */
.upload-area { border: 2px dashed var(--border); border-radius: 16px; padding: 40px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
.upload-area:hover { border-color: var(--purple); }
.upload-area input { display: none; }
.upload-area .upload-icon { font-size: 40px; color: var(--text-light); margin-bottom: 12px; }
.upload-area .upload-text { font-size: 14px; color: var(--text-muted); }
.upload-compact { border: 2px dashed var(--border); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 12px; transition: border-color 0.2s; }
.upload-compact:hover { border-color: var(--purple); }
.upload-compact input { display: none; }

/* --- Loading --- */
.loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .content { padding: 16px; }

  /* Top bar: hamburger */
  .top-bar .user-info .name,
  .top-bar .user-info .role-badge,
  .top-bar .user-info .btn-outline { display: none; }
  .hamburger { display: block; }

  /* Inline tabs mobile */
  .tab-btn { padding: 0 10px; font-size: 12px; }
  .top-bar .logo { font-size: 14px; margin-right: 4px; }

  /* Stat cards */
  .stat-card .value { font-size: 24px; }
  .stat-card { padding: 16px; }

  /* Loss banner */
  .loss-banner .loss-amount, .ok-banner .ok-amount { font-size: 24px; }

  /* Chart */
  .chart-wrap { height: 240px; }
  .card { padding: 16px; border-radius: 12px; }

  /* Item cards: show on mobile, hide table */
  .item-card-list { display: block; }
  .desktop-table { display: none; }

  /* Summary footer */
  .summary-footer .sf-value { font-size: 16px; }
}

@media (max-width: 480px) {
  .stat-card .value { font-size: 22px; }
  .stat-card { padding: 14px; }
  .chart-wrap { height: 200px; }
  .content { padding: 12px; }
  .stat-grid { gap: 8px; }
}

@media (min-width: 769px) {
  .stat-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <h1>인센티브 현황판</h1>
    <p class="subtitle">꿈꾸는 정비사</p>
    <input type="text" id="loginId" placeholder="아이디" autocomplete="username">
    <input type="password" id="loginPw" placeholder="비밀번호" autocomplete="current-password">
    <button onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="app">
  <div class="top-bar">
    <span class="logo">인센티브 현황판</span>
    <div class="inline-tabs" id="inlineTabs"></div>
    <div class="user-info">
      <span class="name" id="userName"></span>
      <span class="role-badge" id="userRole"></span>
      <button class="btn-outline" onclick="showChangePw()" style="border-color:var(--blue);color:var(--blue)">비밀번호 변경</button>
      <button class="btn-outline" onclick="doLogout()">로그아웃</button>
      <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileMenu()">☰</button>
    </div>
    <div class="mobile-dropdown" id="mobileMenu">
      <div class="dd-info" id="ddUserInfo"></div>
      <button onclick="showChangePw();closeMobileMenu()">비밀번호 변경</button>
      <button onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- Password Change Modal -->
  <div id="pwModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:999;justify-content:center;align-items:center">
    <div style="background:var(--card);border-radius:16px;padding:32px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.15);margin:16px">
      <h3 style="margin-bottom:20px;font-size:18px">비밀번호 변경</h3>
      <input type="password" id="pwCurrent" placeholder="현재 비밀번호" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:10px;background:#FAFAFA">
      <input type="password" id="pwNew" placeholder="새 비밀번호" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:10px;background:#FAFAFA">
      <input type="password" id="pwConfirm" placeholder="새 비밀번호 확인" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:16px;background:#FAFAFA">
      <div id="pwError" style="color:var(--red);font-size:13px;min-height:20px;margin-bottom:8px"></div>
      <div style="display:flex;gap:10px">
        <button onclick="closePwModal()" style="flex:1;padding:12px;background:none;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;cursor:pointer">취소</button>
        <button onclick="doChangePw()" style="flex:1;padding:12px;background:var(--purple);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">변경</button>
      </div>
    </div>
  </div>

  <div class="tab-bar" id="tabBar"></div>

  <div class="content">
    <div class="tab-content" id="tab-team">
      <div class="month-sel">
        <label>조회 월:</label>
        <select id="teamMonthSel" onchange="loadTeamData()"></select>
      </div>
      <div id="teamContent"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
    </div>
    <div class="tab-content" id="tab-manager">
      <div class="month-sel">
        <label>조회:</label>
        <select id="managerYearSel" onchange="loadManagerData()" style="margin-right:4px"></select>
        <select id="managerMonthSel" onchange="loadManagerData()"></select>
        <span style="margin-left:8px;font-size:11px;color:#888780;cursor:pointer;text-decoration:underline" onclick="toggleManagerView()">기존 보기</span>
      </div>
      <div id="managerContent"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
    </div>
    <div class="tab-content" id="tab-director">
      <div class="month-sel">
        <label>조회:</label>
        <select id="directorYearSel" onchange="loadDirectorData()" style="margin-right:4px"></select>
        <select id="directorMonthSel" onchange="loadDirectorData()"></select>
      </div>
      <div id="directorContent"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
    </div>
    <div class="tab-content" id="tab-admin">
      <div id="adminContent"></div>
    </div>
    <div class="tab-content" id="tab-settlement">
      <div id="settlementContent"></div>
    </div>
  </div>
</div>

<script>
const API = '/api/incentive';
let token = localStorage.getItem('inc_token');
let currentUser = null;
let chartInstances = {};

function fmt(n) { if (n == null) return '-'; return Math.round(n).toLocaleString('ko-KR'); }
function fmtWon(n) { if (n == null) return '-'; return fmt(n) + '원'; }
function fmtMan(n) {
  if (n == null) return '-';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  const eok = Math.floor(abs / 100000000);
  const man = Math.round((abs % 100000000) / 10000);
  if (eok > 0 && man > 0) return sign + eok + '억 ' + man.toLocaleString('ko-KR') + '만';
  if (eok > 0) return sign + eok + '억';
  return sign + man.toLocaleString('ko-KR') + '만';
}
function fmtBigWon(n) {
  if (n == null) return '-';
  return fmtMan(n) + '원';
}
function isMobile() { return window.innerWidth <= 768; }

// YouTube Studio style arrow (circle with white arrow inside)
function ytArrow(diff) {
  if (diff == null || diff === 0) return '';
  const isUp = diff > 0;
  return `<span class="yt-arrow ${isUp?'up':'down'}">${isUp?'▲':'▼'}</span>`;
}

// SVG Donut gauge helper
function svgDonut(pct, color, size = 90, stroke = 8) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const filled = Math.min(pct, 100) / 100 * circ;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#F0EFEA" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${filled} ${circ}" stroke-linecap="round"/>
  </svg>`;
}
function donutColor(pct, isZero) {
  if (isZero) return '#E5E7EB';
  if (pct >= 100) return '#1D9E75';
  if (pct >= 50) return '#7C3AED';
  if (pct >= 20) return '#D97706';
  return '#E24B4A';
}

// Monthly pace prediction: (current / elapsed days) * total days
function predictMonthEnd(currentTotal, month) {
  const now = new Date();
  const [y, m] = month.includes('년') ?
    [parseInt('20' + month.split('년')[0]), parseInt(month.split('년')[1])] :
    [parseInt(month.split('-')[0]), parseInt(month.split('-')[1])];
  const totalDays = new Date(y, m, 0).getDate();
  const elapsed = (y === now.getFullYear() && m === now.getMonth() + 1) ? now.getDate() : totalDays;
  if (elapsed <= 0) return currentTotal;
  return Math.round(currentTotal / elapsed * totalDays);
}

function runCountUp(container) {
  const els = (container || document).querySelectorAll('[data-countup]');
  els.forEach(el => {
    const target = parseInt(el.getAttribute('data-countup')) || 0;
    const duration = 2000;
    const fps = 30;
    const totalFrames = Math.round(duration / (1000 / fps));
    let frame = 0;
    const start = performance.now();
    const isWon = el.textContent.includes('원');
    function tick() {
      frame++;
      const progress = Math.min(frame / totalFrames, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      if (progress < 1) {
        const jitter = Math.round(target * (0.5 + Math.random() * 1.5));
        const blend = Math.round(jitter * (1 - ease) + target * ease);
        el.textContent = isWon ? fmtWon(blend) : fmt(blend);
        requestAnimationFrame(tick);
      } else {
        el.textContent = isWon ? fmtWon(target) : fmt(target);
      }
    }
    requestAnimationFrame(tick);
  });
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...opts.headers },
  });
  if (res.status === 401) { doLogout(); throw new Error('인증 만료'); }
  if (!res.ok) throw new Error('API 오류: ' + res.status);
  return res.json();
}

// ===== Stock Chart Helper =====
function createStockChart(canvasId, labels, dataArr, options = {}) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  const ctx2d = canvas.getContext('2d');

  const mainColor = options.color || '#7C3AED';
  const negColor = options.negColor || '#E24B4A';
  const hasNeg = options.negCheck;
  const refLine = options.refLine;
  const yFormat = options.yFormat || (v => fmt(v));
  const tipFormat = options.tipFormat || (v => fmtWon(v));

  const grad = ctx2d.createLinearGradient(0, 0, 0, 320);
  grad.addColorStop(0, mainColor + '30');
  grad.addColorStop(1, mainColor + '05');

  const pointColors = hasNeg
    ? dataArr.map((v, i) => hasNeg(i) ? negColor : mainColor)
    : dataArr.map(() => mainColor);

  const segmentBorder = hasNeg ? {
    borderColor: (ctx) => {
      const i = ctx.p0DataIndex;
      return hasNeg(i) || hasNeg(i + 1) ? negColor : mainColor;
    }
  } : {};

  const datasets = [{
    label: options.label || '',
    data: dataArr,
    borderColor: hasNeg ? pointColors : mainColor,
    backgroundColor: grad,
    fill: true,
    tension: 0,
    borderWidth: 2.5,
    pointRadius: 5,
    pointHoverRadius: 8,
    pointBackgroundColor: pointColors,
    pointBorderColor: '#fff',
    pointBorderWidth: 2,
    pointHitRadius: 20,
    segment: segmentBorder,
  }];

  const refPlugin = refLine ? {
    id: 'refLine',
    beforeDraw(chart) {
      const yAxis = chart.scales.y;
      const y = yAxis.getPixelForValue(refLine.value);
      const { ctx, chartArea } = chart;
      if (y < chartArea.top || y > chartArea.bottom) return;
      ctx.save();
      ctx.beginPath();
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = refLine.color || '#E24B4A';
      ctx.lineWidth = 1.5;
      ctx.moveTo(chartArea.left, y);
      ctx.lineTo(chartArea.right, y);
      ctx.stroke();
      ctx.font = '11px Noto Sans KR';
      ctx.fillStyle = refLine.color || '#E24B4A';
      ctx.textAlign = 'right';
      ctx.fillText(refLine.label || '', chartArea.right - 4, y - 6);
      ctx.restore();
    }
  } : null;

  const crosshairPlugin = {
    id: 'crosshair',
    afterDraw(chart) {
      if (chart.tooltip && chart.tooltip.opacity > 0 && chart.tooltip.caretX) {
        const { ctx, chartArea } = chart;
        const x = chart.tooltip.caretX;
        ctx.save();
        ctx.beginPath();
        ctx.setLineDash([3, 3]);
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 1;
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.stroke();
        ctx.restore();
      }
    }
  };

  const plugins = [crosshairPlugin];
  if (refPlugin) plugins.push(refPlugin);

  return new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    plugins,
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(34,34,34,0.92)',
          titleFont: { size: 13, weight: '600', family: 'Noto Sans KR' },
          bodyFont: { size: 14, family: 'Noto Sans KR' },
          padding: 12,
          cornerRadius: 10,
          displayColors: false,
          callbacks: {
            title: (items) => items[0].label,
            label: (ctx) => tipFormat(ctx.raw),
          },
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 11, family: 'Noto Sans KR' }, color: '#aaa' },
        },
        y: {
          grid: { color: '#f0f0f0', drawBorder: false },
          border: { display: false },
          ticks: { font: { size: 11, family: 'Noto Sans KR' }, color: '#bbb', callback: yFormat, maxTicksLimit: 4 },
          min: 0,
        },
      },
      animation: { duration: 600, easing: 'easeOutQuart' },
    },
  });
}

// ===== Auth =====
async function doLogin() {
  const loginId = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!loginId || !pw) { errEl.textContent = '아이디와 비밀번호를 입력하세요'; return; }
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ loginId, password: pw }),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); errEl.textContent = d.message || '로그인 실패'; return; }
    const data = await res.json();
    token = data.token;
    localStorage.setItem('inc_token', token);
    await initApp();
  } catch (e) { errEl.textContent = '서버 연결 실패'; }
}

function doLogout() {
  token = null; currentUser = null;
  localStorage.removeItem('inc_token');
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
}

async function initApp() {
  try { currentUser = await api('/auth/me'); } catch { doLogout(); return; }
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('userName').textContent = currentUser.name;
  const roleMap = { admin: '관리자', manager: '매니저', director: '부장', viewer: '' };
  const roleEl = document.getElementById('userRole');
  roleEl.textContent = roleMap[currentUser.role] || currentUser.role;
  roleEl.className = 'role-badge role-' + currentUser.role;
  // Mobile dropdown info
  const ddInfo = document.getElementById('ddUserInfo');
  if (currentUser.role === 'viewer') {
    roleEl.style.display = 'none';
    document.getElementById('userName').textContent = '';
    ddInfo.textContent = '공용 계정';
  } else {
    ddInfo.textContent = currentUser.name + ' · ' + (roleMap[currentUser.role] || currentUser.role);
  }
  buildTabs();
}

function buildTabs() {
  const bar = document.getElementById('inlineTabs');
  bar.innerHTML = '';
  const tabs = [{ id: 'team', label: '팀 인센티브' }];
  if (currentUser.access.includes('manager')) tabs.push({ id: 'manager', label: '김권중' });
  if (currentUser.access.includes('director')) tabs.push({ id: 'director', label: '이정석' });
  if (currentUser.access.includes('admin')) tabs.push({ id: 'settlement', label: '월말결산' });
  if (currentUser.access.includes('admin')) tabs.push({ id: 'admin', label: '관리자' });
  tabs.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => switchTab(t.id, btn);
    bar.appendChild(btn);
  });
  switchTab(tabs[0].id, bar.querySelector('.tab-btn'));
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
  if (btn) btn.classList.add('active');
  if (tabId === 'team') loadTeamInit();
  else if (tabId === 'manager') loadManagerInit();
  else if (tabId === 'director') loadDirectorInit();
  else if (tabId === 'settlement') loadSettlement();
  else if (tabId === 'admin') loadAdminPanel();
}

function getItemOrder(configs) {
  const order = {};
  configs.filter(c => c.key.startsWith('item_order_')).forEach(c => { order[c.key.replace('item_order_','')] = c.value; });

}

let teamMonthlyData = null;
async function loadTeamInit() {
  if (teamMonthlyData) return;
  try {
    await getConfigs();
    teamMonthlyData = await api('/team/monthly');
    const sel = document.getElementById('teamMonthSel');
    sel.innerHTML = '';
    teamMonthlyData.forEach((m, i) => {
      const opt = document.createElement('option');
      opt.value = m.month; opt.textContent = m.month;
      if (i === teamMonthlyData.length - 1) opt.selected = true;
      sel.appendChild(opt);
    });
    loadTeamData();
  } catch (e) { document.getElementById('teamContent').innerHTML = '<p style="color:var(--red)">데이터 로드 실패</p>'; }
}

async function loadTeamData() {
  const month = document.getElementById('teamMonthSel').value;
  if (!month) return;
  const el = document.getElementById('teamContent');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>로딩 중...</div>';
  try {
    const data = await api('/team/current?month=' + encodeURIComponent(month));
    renderTeam(data, el);
  } catch (e) { el.innerHTML = '<p style="color:var(--red)">데이터 로드 실패</p>'; }
}

const ITEM_LABELS = {
  brake_oil:'브레이크오일', lining:'라이닝', mission_oil:'미션오일', diff_oil:'데후오일',
  wiper:'와이퍼', battery:'밧데리', ac_filter:'에어컨필터',
  guardian_h3:'가디안H3', guardian_h5:'가디안H5', guardian_h7:'가디안H7',
};
const ITEM_RATES = {
  brake_oil:2.8, lining:1.4, mission_oil:2.8, diff_oil:1.0,
  wiper:0.3, battery:0.5, ac_filter:1.0, guardian_h3:2.0, guardian_h5:2.0, guardian_h7:2.0,
};

function renderTeam(data, el) {
  const inc = data.incentive;
  const isLoss = inc.lost > 0;
  let html = '';

  // Build items data first (needed for metrics)
  let totalSales=0, totalInc=0;
  const activeItems = [];
  const zeroItems = [];
  for (const [key,val] of Object.entries(data.items)) {
    const rate = ITEM_RATES[key]||0;
    const itemInc = Math.round(val.sales*rate/100);
    totalSales += val.sales;
    totalInc += itemInc;
    const item = { key, label: ITEM_LABELS[key]||key, sales: val.sales, qty: val.qty, rate, inc: itemInc, minQty: null, minQtyMet: null };
    if (val.sales > 0) activeItems.push(item);
    else zeroItems.push(item);
  }

  // Map min qty info to items
  const mqItems = (data.minQtyCheck && data.minQtyCheck.items) || [];
  mqItems.forEach(mq => {
    const found = [...activeItems, ...zeroItems].find(i => i.key === mq.itemKey);
    if (found) { found.minQty = mq.target; found.minQtyMet = mq.met; }
  });

  // Prev month
  const prevInc = data.prevMonth ? (data.prevMonth.incentive || 0) : null;
  const prevDiff = prevInc !== null ? inc.actual - prevInc : null;
  const prevPct = prevInc && prevInc > 0 ? Math.round((prevDiff / prevInc) * 100) : null;

  // Min qty stats
  const mqc = data.minQtyCheck || { items: [], metCount: 0, totalCount: 0, hasUnmet: false };

  // Monthly prediction
  const predicted = predictMonthEnd(inc.actual, data.month);

  // 차트 (맨 위)
  html += `<div class="card"><div class="card-title">월별 인센티브 추이</div><div class="chart-wrap"><canvas id="teamChart"></canvas></div></div>`;

  // ===== 1층: 돈 (스크롤 없이 바로 보임) =====

  // 감액 배너
  const lossArrow = inc.lost > 0 ? `<span class="yt-arrow down">▼</span>` : `<span class="yt-arrow up">▲</span>`;
  if (isLoss) {
    html += `<div style="background:#FCEBEB;border-radius:12px;padding:24px;text-align:center;margin-bottom:12px">
      <div style="font-size:18px;font-weight:800;color:#E24B4A;margin-bottom:20px">⚠️ 인센티브 50% 감액 중</div>
      <div style="font-size:15px;font-weight:700;color:#2C2C2A;margin-bottom:4px">실제 수령액</div>
      <div style="font-size:36px;font-weight:900;color:#E24B4A;margin-bottom:16px" data-countup="${inc.actual}">${fmtWon(inc.actual)}</div>
      <div style="display:flex;justify-content:center;align-items:flex-start;gap:12px">
        <div style="flex:1;text-align:center">
          <div style="font-size:12px;font-weight:700;color:#2C2C2A;margin-bottom:4px">목표 달성 시</div>
          <div style="font-size:18px;font-weight:800;color:#2C2C2A" data-countup="${inc.calculated}">${fmtWon(inc.calculated)}</div>
        </div>
        <div style="width:1px;height:44px;background:#E24B4A;opacity:0.2"></div>
        <div style="flex:1;text-align:center">
          <div style="font-size:12px;font-weight:700;color:#2C2C2A;margin-bottom:4px">손해 금액</div>
          <div style="display:flex;align-items:center;justify-content:center;gap:4px">
            ${lossArrow}
            <span style="font-size:18px;font-weight:800;color:#2C2C2A">${fmtWon(inc.lost)}</span>
          </div>
        </div>
        <div style="width:1px;height:44px;background:#E24B4A;opacity:0.2"></div>
        <div style="flex:1;text-align:center">
          <div style="font-size:12px;font-weight:700;color:#2C2C2A;margin-bottom:4px">전월 대비</div>
          <div style="display:flex;align-items:center;justify-content:center;gap:4px">
            ${prevPct !== null ? `${ytArrow(prevDiff)}<span style="font-size:18px;font-weight:800;color:${prevDiff>=0?'#1D9E75':'#2C2C2A'}">${prevPct>=0?'+':''}${prevPct}%</span>` : '<span style="font-size:18px;font-weight:800;color:#B4B2A9">-</span>'}
          </div>
        </div>
      </div>
    </div>`;
  } else {
    html += `<div style="background:#E1F5EE;border-radius:12px;padding:24px;text-align:center;margin-bottom:12px">
      <div style="font-size:14px;font-weight:700;color:#1D9E75;margin-bottom:12px">✅ 전 품목 달성! 인센티브 100% 수령</div>
      <div style="font-size:17px;font-weight:900;color:var(--text);margin-bottom:4px">이번 달 인센티브</div>
      <div style="font-size:36px;font-weight:900;color:#1D9E75;margin-bottom:16px" data-countup="${inc.actual}">${fmtWon(inc.actual)}</div>
      <div style="display:flex;justify-content:center;align-items:flex-start;gap:16px">
        <div style="text-align:center">
          <div style="font-size:12px;font-weight:700;color:#2C2C2A;margin-bottom:4px">전월 대비</div>
          <div style="display:flex;align-items:center;justify-content:center;gap:4px">
            ${prevPct !== null ? `${ytArrow(prevDiff)}<span style="font-size:18px;font-weight:800;color:${prevDiff>=0?'#1D9E75':'#2C2C2A'}">${prevPct>=0?'+':''}${prevPct}%</span>` : '<span style="font-size:18px;font-weight:800;color:#B4B2A9">-</span>'}
          </div>
        </div>
      </div>
    </div>`;
  }

  // ===== 2층: 최소수량 (스크롤 1번) =====

  if (mqc.items.length > 0) {

    // 프로그레스 바 (미달 위, 달성 아래)
    html += `<div class="card"><div class="card-title">최소수량 달성 현황</div>`;
    const sorted = [...mqc.items].sort((a,b) => a.met - b.met || (a.target > 0 ? a.current/a.target : 1) - (b.target > 0 ? b.current/b.target : 1));
    sorted.forEach(item => {
      const pct = item.target > 0 ? Math.round(item.current / item.target * 100) : 100;
      const barPct = Math.min(pct, 150);
      let barColor = '#E24B4A';
      if (item.met) barColor = '#1D9E75';
      else if (pct >= 80) barColor = '#BA7517';

      html += `<div class="mqp-item">
        <div class="mqp-header">
          <span class="mqp-name">${item.met ? '✅' : '⚠️'} ${ITEM_LABELS[item.itemKey]||item.itemKey}</span>
          <span class="mqp-count" style="color:${barColor}">${item.current}/${item.target}건 (${pct}%)</span>
        </div>
        <div class="mqp-bar-wrap">
          <div class="mqp-bar" style="width:${Math.min(barPct, 100)}%;background:${barColor}"></div>
          <div class="mqp-target-line" style="left:${Math.min(100 / (barPct > 100 ? barPct/100 : 1), 100)}%"></div>
        </div>
        ${!item.met ? `<div class="mqp-action" style="color:${barColor};font-weight:600">${item.remaining}건 더 하면 감액 해제!</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  // ===== 3층: 품목별 도넛 게이지 =====
  const prevItems = (data.prevMonth && data.prevMonth.items) || {};
  const itemOrder = configCache ? getItemOrder(configCache) : {};
  const allItems = [...activeItems, ...zeroItems].sort((a,b) => (itemOrder[a.key] ?? 99) - (itemOrder[b.key] ?? 99));

  html += `<div class="card"><div style="font-size:28px;font-weight:800;color:#2C2C2A;text-align:center;margin-bottom:20px">품목별 인센티브</div><div class="donut-grid">`;
  allItems.forEach(item => {
    const isZero = item.sales === 0;
    const hasMq = item.minQty !== null && item.minQty > 0;
    const prevItem = prevItems[item.key];
    const prevSales = prevItem ? prevItem.sales : 0;
    const prevQty = prevItem ? prevItem.qty : 0;

    let pct, subText, statusText;
    if (hasMq) {
      // 최소수량 있는 품목: 목표 수량 대비 달성률
      pct = item.minQty > 0 ? Math.round(item.qty / item.minQty * 100) : 0;
      subText = `${item.qty}/${item.minQty}건`;
      const remaining = item.minQty - item.qty;
      statusText = item.minQtyMet
        ? `<span style="color:#10B981">달성 완료</span>`
        : `<span style="color:#F97316">${remaining}건 남음</span>`;
    } else {
      // 최소수량 없는 품목: 지난달 매출 대비 달성률
      pct = prevSales > 0 ? Math.round(item.sales / prevSales * 100) : (isZero ? 0 : 100);
      subText = prevQty > 0 ? `지난달 ${prevQty}건` : (prevSales > 0 ? `지난달 ${fmtWon(prevSales)}` : '');
      if (isZero) {
        statusText = `<span style="color:#B4B2A9">매출 없음</span>`;
      } else if (prevSales > 0) {
        const diff = pct - 100;
        statusText = diff >= 0
          ? `<span style="color:#10B981">지난달 대비 +${diff}%</span>`
          : `<span style="color:#F97316">지난달 대비 ${diff}%</span>`;
      } else {
        statusText = `<span style="color:#10B981">신규 매출</span>`;
      }
    }

    const color = donutColor(pct, isZero);
    const opacity = isZero ? 'opacity:0.4;' : '';
    // 감액 구간 뱃지: 최소수량 있고, 달성률 20% 미만이면 표시
    const isDeductZone = hasMq && !item.minQtyMet && pct < 20;

    html += `<div class="donut-card" style="${opacity}${isDeductZone ? 'border:1.5px solid #E24B4A;' : ''}">
      <div style="background:${isZero ? '#E5E7EB' : '#888780'};padding:6px 10px;border-radius:8px;margin-bottom:10px;position:relative">
        <div style="font-size:14px;font-weight:800;color:#FFFFFF;text-align:center">${item.label}</div>
        ${isDeductZone ? '<span style="position:absolute;top:-8px;right:-4px;background:#E24B4A;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:8px;white-space:nowrap">감액 구간</span>' : ''}
      </div>
      <div class="donut-wrap">
        ${svgDonut(pct, color)}
        <div class="donut-center">
          <div class="donut-pct" style="color:${color}">${pct}%</div>
          ${subText ? `<div class="donut-sub">${subText}</div>` : ''}
        </div>
      </div>
      <div class="donut-inc">${fmtWon(item.inc)}</div>
      <div class="donut-status">${statusText}</div>
    </div>`;
  });
  html += `</div>`;

  // 합계 행
  if (isLoss) {
    html += `<div style="display:flex;justify-content:space-between;padding:12px 0;border-top:2px solid var(--border);margin-top:12px">
      <span style="font-size:13px;font-weight:700;color:var(--text)">합계</span>
      <div style="text-align:right">
        <span style="font-size:15px;font-weight:900;color:var(--text)">${fmtWon(totalInc)}</span>
        <span style="font-size:12px;color:#E24B4A;margin-left:8px">(감액 후 ${fmtWon(inc.actual)})</span>
      </div>
    </div>`;
  }
  html += `</div>`;

  // 엑셀 업로드 (맨 하단)
  html += `<div class="card" style="margin-top:24px">
    <div class="card-title">극동 엑셀 업로드</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <label style="font-size:13px;color:var(--text-muted)">대상 날짜:</label>
      <input type="date" id="teamUploadMonth" style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;font-family:'Noto Sans KR'">
    </div>
    <div class="upload-area" onclick="document.getElementById('teamExcelFile').click()"
      ondragover="event.preventDefault();this.style.borderColor='#7C3AED';this.style.background='#F5F3FF'"
      ondragleave="this.style.borderColor='';this.style.background='#FAFAFA'"
      ondrop="event.preventDefault();this.style.borderColor='';this.style.background='#FAFAFA';var f=document.getElementById('teamExcelFile');f.files=event.dataTransfer.files;uploadExcel(f)"
      style="border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:#FAFAFA">
      <div style="font-size:28px;margin-bottom:8px">📄</div>
      <div style="font-size:13px;color:var(--text-muted)">극동 매출 엑셀 파일을 선택하거나 드래그하세요</div>
      <input type="file" id="teamExcelFile" accept=".xlsx,.xls" onchange="uploadExcel(this)" style="display:none">
    </div>
    <div id="teamUploadResult" style="margin-top:16px"></div>
  </div>`;

  el.innerHTML = html;
  // teamUploadMonth 초기값 설정
  const teamUpMon = document.getElementById('teamUploadMonth');
  if (teamUpMon) { const n=new Date(); teamUpMon.value = n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'); }
  runCountUp(el);

  // Render chart
  if (teamMonthlyData && teamMonthlyData.length > 0) {
    if (chartInstances.team) chartInstances.team.destroy();
    chartInstances.team = createStockChart('teamChart',
      teamMonthlyData.map(m => m.month),
      teamMonthlyData.map(m => m.incentive),
      { color: '#5B9BD5', negColor: '#E24B4A', negCheck: (i) => teamMonthlyData[i] && teamMonthlyData[i].penalized, yFormat: v => fmtMan(v), tipFormat: v => fmtWon(v), label: '인센티브' }
    );
  }
}

function toggleZeroItems(btn) {
  const container = btn.nextElementSibling;
  if (container.style.display === 'none') {
    container.style.display = 'block';
    btn.textContent = '매출 없는 품목 접기';
  } else {
    container.style.display = 'none';
    const count = container.querySelectorAll('.item-card').length;
    btn.textContent = '매출 없는 품목 ' + count + '개 보기';
  }
}

// ===== MANAGER =====
let managerMonthlyData = null;
let managerViewMode = 'salesTarget'; // 'salesTarget' or 'legacy'
function toggleManagerView() {
  managerViewMode = managerViewMode === 'salesTarget' ? 'legacy' : 'salesTarget';
  loadManagerData();
}
async function loadManagerInit() {
  try {
    if (!managerMonthlyData) {
      try { managerMonthlyData = await api('/manager/monthly'); } catch(e) { managerMonthlyData = []; }
    }
    const now = new Date();
    const curYear = now.getFullYear();
    const curMonth = now.getMonth() + 1;
    // 연도 셀렉터
    const yearSel = document.getElementById('managerYearSel');
    if (yearSel.options.length === 0) {
      [curYear - 1, curYear, curYear + 1].forEach(y => {
        const opt = document.createElement('option');
        opt.value = y; opt.textContent = y + '년';
        if (y === curYear) opt.selected = true;
        yearSel.appendChild(opt);
      });
    }
    // 월 셀렉터
    const sel = document.getElementById('managerMonthSel');
    if (sel.options.length === 0) {
      for (let m = 1; m <= 12; m++) {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m + '월';
        if (m === curMonth) opt.selected = true;
        sel.appendChild(opt);
      }
    }
    loadManagerData();
  } catch (e) { document.getElementById('managerContent').innerHTML = '<p style="color:var(--red)">데이터 로드 실패</p>'; }
}

async function loadManagerData() {
  const year = parseInt(document.getElementById('managerYearSel').value);
  const month = parseInt(document.getElementById('managerMonthSel').value);
  if (!year || !month) return;
  const el = document.getElementById('managerContent');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>로딩 중...</div>';
  try {
    if (managerViewMode === 'salesTarget') {
      const data = await api('/manager-sales-target/' + year + '/' + month);
      renderManagerSalesTarget(data, el, year, month);
      return;
    }
    // Legacy view
    const monthStr = (year % 100) + '년 ' + month + '월';
    const data = await api('/manager/current?month=' + encodeURIComponent(monthStr));
    renderManager(data, el);
  } catch (e) { el.innerHTML = '<p style="color:var(--red)">데이터 로드 실패</p>'; }
}

function renderManager(data, el) {
  const isLoss = data.lost > 0;
  const fullIncentive = data.fullTotalIncentive || (data.totalIncentive + (data.lost || 0));
  let html = '';

  // Prev month
  let mgrPrevDiff = null, mgrPrevMonth = null;
  if (managerMonthlyData && managerMonthlyData.length >= 2) {
    const curIdx = managerMonthlyData.findIndex(m => m.month === data.month);
    if (curIdx > 0) {
      mgrPrevDiff = data.totalIncentive - managerMonthlyData[curIdx - 1].totalIncentive;
      mgrPrevMonth = managerMonthlyData[curIdx - 1];
    }
  }
  const mgrPrevPct = mgrPrevMonth && mgrPrevMonth.totalIncentive > 0 ? Math.round((mgrPrevDiff / mgrPrevMonth.totalIncentive) * 100) : null;
  const mgrPredicted = predictMonthEnd(data.totalIncentive, data.month);

  // 차트 (맨 위)
  html += `<div class="card"><div class="card-title">월별 인센티브 추이</div><div class="chart-wrap"><canvas id="managerChart"></canvas></div></div>`;

  // ===== 1층: 돈 =====

  // 감액 배너
  if (isLoss) {
    html += `<div style="background:#FCEBEB;border-radius:12px;padding:24px;text-align:center;margin-bottom:12px">
      <div style="font-size:18px;font-weight:800;color:#E24B4A;margin-bottom:20px">⚠️ 팀 최소수량 미달 — 팀 보너스 감액</div>
      <div style="font-size:15px;font-weight:700;color:#2C2C2A;margin-bottom:4px">실제 수령액</div>
      <div style="font-size:36px;font-weight:900;color:#E24B4A;margin-bottom:16px" data-countup="${data.totalIncentive}">${fmtWon(data.totalIncentive)}</div>
      <div style="display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:12px">
        <div style="text-align:center">
          <div style="font-size:14px;font-weight:700;color:#2C2C2A;margin-bottom:4px">목표 달성 시 받을 금액</div>
          <div style="font-size:22px;font-weight:800;color:#2C2C2A" data-countup="${fullIncentive}">${fmtWon(fullIncentive)}</div>
        </div>
        <div style="width:1px;height:40px;background:#E24B4A;opacity:0.3"></div>
        <div style="text-align:center">
          <div style="font-size:14px;font-weight:700;color:#E24B4A;margin-bottom:4px">손해 금액</div>
          <div style="font-size:22px;font-weight:800;color:#E24B4A">-${fmtWon(data.lost)}</div>
        </div>
      </div>
    </div>`;
  } else {
    html += `<div style="background:#E1F5EE;border-radius:12px;padding:24px;text-align:center;margin-bottom:12px">
      <div style="font-size:14px;font-weight:700;color:#1D9E75;margin-bottom:12px">✅ 팀 최소수량 달성! 100% 수령</div>
      <div style="font-size:17px;font-weight:900;color:var(--text);margin-bottom:4px">이번 달 인센티브</div>
      <div style="font-size:36px;font-weight:900;color:#1D9E75" data-countup="${data.totalIncentive}">${fmtWon(data.totalIncentive)}</div>
    </div>`;
  }

  // 전월 대비 인센티브 도넛 게이지 2개
  const prevTire = mgrPrevMonth ? mgrPrevMonth.tireIncentive : 0;
  const prevTeam = mgrPrevMonth ? mgrPrevMonth.teamBonus : 0;
  const tirePct = prevTire > 0 ? Math.round((data.tireIncentive / prevTire) * 100) : (data.tireIncentive > 0 ? 999 : 0);
  const teamPct = prevTeam > 0 ? Math.round((data.teamBonus / prevTeam) * 100) : (data.teamBonus > 0 ? 999 : 0);
  const tireDiff = data.tireIncentive - prevTire;
  const teamDiff = data.teamBonus - prevTeam;

  function mgrDonutColor(pct, isZero) {
    if (isZero) return '#E5E7EB';
    if (pct >= 100) return '#10B981';
    if (pct >= 50) return '#7C3AED';
    return '#EF4444';
  }
  function mgrDonutSvg(pct, color) {
    const size = 110, stroke = 8, r = (size - stroke) / 2;
    const circ = 2 * Math.PI * r;
    const filled = Math.min(pct, 100) / 100 * circ;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#F3F4F6" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-dasharray="${filled} ${circ}" stroke-dashoffset="0" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 0.6s ease"/>
    </svg>`;
  }
  function mgrDiffBadge(diff) {
    if (diff === 0) return '';
    const color = diff > 0 ? '#1D9E75' : '#EF4444';
    const bg = diff > 0 ? '#E1F5EE' : '#FCEBEB';
    return `<span style="display:inline-block;font-size:11px;font-weight:700;color:${color};background:${bg};padding:2px 8px;border-radius:10px">${diff>0?'+':''}${fmtWon(diff)}</span>`;
  }

  const tireColor = mgrDonutColor(tirePct, data.tireIncentive === 0);
  const teamColor = mgrDonutColor(teamPct, data.teamBonus === 0);

  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
    <div class="card" style="text-align:center;padding:16px 12px;border-radius:14px;border:1px solid #F0F0F0">
      <div style="background:#E1F5EE;padding:6px 10px;border-radius:8px;margin-bottom:10px">
        <div style="font-size:14px;font-weight:800;color:#1D9E75">타이어 인센티브</div>
      </div>
      <div style="position:relative;display:inline-block;margin-bottom:10px">
        ${mgrDonutSvg(tirePct, tireColor)}
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
          <div style="font-size:22px;font-weight:900;color:${tireColor}">${tirePct > 999 ? '∞' : tirePct + '%'}</div>
          <div style="font-size:10px;color:#888780">전월 대비</div>
        </div>
      </div>
      <div style="font-size:18px;font-weight:800;color:#7C3AED;margin-bottom:4px" data-countup="${data.tireIncentive}">${fmtWon(data.tireIncentive)}</div>
      ${mgrPrevMonth ? mgrDiffBadge(tireDiff) : ''}
      ${mgrPrevMonth ? `<div style="font-size:12px;color:#2C2C2A;font-weight:700;margin-top:4px">전월: ${fmtWon(prevTire)}</div>` : ''}
    </div>
    <div class="card" style="text-align:center;padding:16px 12px;border-radius:14px;border:1px solid #F0F0F0">
      <div style="background:#E1F5EE;padding:6px 10px;border-radius:8px;margin-bottom:10px">
        <div style="font-size:14px;font-weight:800;color:#1D9E75">권중 프리미엄 (x1.5)</div>
      </div>
      <div style="position:relative;display:inline-block;margin-bottom:10px">
        ${mgrDonutSvg(teamPct, teamColor)}
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
          <div style="font-size:22px;font-weight:900;color:${teamColor}">${teamPct > 999 ? '∞' : teamPct + '%'}</div>
          <div style="font-size:10px;color:#888780">전월 대비</div>
        </div>
      </div>
      <div style="font-size:18px;font-weight:800;color:#7C3AED;margin-bottom:4px" data-countup="${data.teamBonus}">${fmtWon(data.teamBonus)}</div>
      ${mgrPrevMonth ? mgrDiffBadge(teamDiff) : ''}
      ${mgrPrevMonth ? `<div style="font-size:12px;color:#2C2C2A;font-weight:700;margin-top:4px">전월: ${fmtWon(prevTeam)}</div>` : ''}
    </div>
  </div>`;

  // ===== 상세내역 =====
  html += `<div class="card"><div class="card-title">상세내역</div><table class="data-table"><tbody>
    <tr><td style="color:var(--text-muted);font-size:12px;font-weight:600;padding:8px 0 4px" colspan="2">타이어 매출</td></tr>
    <tr><td>타이어 매출</td><td class="num" style="font-weight:600">${fmtWon(data.tireSales)}</td></tr>
    <tr><td>얼라이먼트 매출</td><td class="num" style="font-weight:600">${fmtWon(data.alignmentSales)}</td></tr>
    <tr style="font-weight:700;border-top:2px solid var(--border)"><td>매출 합계</td><td class="num">${fmtWon(data.tireSales+data.alignmentSales)}</td></tr>
    <tr><td>타이어 인센티브 (0.3%)</td><td class="num" style="font-weight:700;color:var(--purple)">${fmtWon(data.tireIncentive)}</td></tr>
    <tr><td style="color:var(--text-muted);font-size:12px;font-weight:600;padding:12px 0 4px" colspan="2">팀 인센티브</td></tr>
    <tr><td>팀 인센티브</td><td class="num" style="font-weight:600">${fmtWon(data.teamIncentive)}</td></tr>
    <tr><td>권중 프리미엄 (x1.5)</td><td class="num" style="font-weight:700;color:var(--purple)">${fmtWon(data.teamBonus)}</td></tr>
    <tr style="font-weight:700;border-top:2px solid var(--border)"><td>총 인센티브</td><td class="num" style="color:var(--purple)">${fmtWon(data.totalIncentive)}</td></tr>
    ${isLoss ? `<tr style="border-top:1px dashed #E24B4A"><td style="color:#E24B4A;font-weight:600">감액 후 실수령</td><td class="num" style="font-weight:900;color:#E24B4A">${fmtWon(data.totalIncentive)}</td></tr>` : ''}
  </tbody></table></div>`;

  el.innerHTML = html;
  runCountUp(el);

  if (managerMonthlyData && managerMonthlyData.length > 0) {
    if (chartInstances.manager) chartInstances.manager.destroy();
    chartInstances.manager = createStockChart('managerChart',
      managerMonthlyData.map(m => m.month),
      managerMonthlyData.map(m => m.totalIncentive),
      { color: '#5B9BD5', yFormat: v => fmtMan(v), tipFormat: v => fmtWon(v), label: '인센티브' }
    );
  }
}

// ===== MANAGER SALES TARGET =====
function renderManagerSalesTarget(data, el, year, month) {
  const isAdmin = currentUser.role === 'admin';

  const prevTotal = data.prevTotal;
  const prevDays = data.prevDays;
  const prevMon = data.prevMonth || (month === 1 ? 12 : month - 1);
  const tysSales = data.tysSales;
  const tyElapsed = data.tyElapsed;
  const tyRemain = data.tyRemain;
  const totalBizDays = data.totalBusinessDays || (tyElapsed + tyRemain);
  const hasData = prevTotal != null && prevDays != null && tysSales != null && tyElapsed != null && prevDays > 0 && tyElapsed > 0;

  let html = '';

  // 차트 (맨 위)
  html += `<div class="card"><div class="card-title">월별 타이어 매출 추이</div><div class="chart-wrap"><canvas id="managerChart"></canvas></div></div>`;

  // 관리자 — 영업일수 수정
  if (isAdmin) {
    html += `<details style="margin-bottom:16px">
      <summary style="cursor:pointer;font-size:13px;font-weight:700;color:#7C3AED;padding:10px 14px;background:#F8F5FF;border:1.5px solid #7C3AED;border-radius:10px;user-select:none">⚙️ 영업일수 수정 (자동 계산됨 — 수정 필요 시 클릭)</summary>
      <div style="background:#F8F5FF;border:1.5px solid #7C3AED;border-top:none;border-radius:0 0 10px 10px;padding:14px">
        <div style="font-size:11px;color:#888780;margin-bottom:10px">매출은 업로드 데이터에서 자동 반영됩니다. 영업일수가 맞지 않을 때만 수정하세요.</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px">
          <div>
            <label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:3px">지난달 영업일</label>
            <input id="mstLyDays" type="number" value="${prevDays ?? ''}" style="width:100%;font-size:13px;font-weight:600;border:1px solid #DDD;border-radius:6px;padding:6px 8px;outline:none">
          </div>
          <div>
            <label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:3px">총 영업일</label>
            <input id="mstTotalDays" type="number" value="${totalBizDays}" oninput="calcMgrRemainDays()" style="width:100%;font-size:13px;font-weight:600;border:1px solid #DDD;border-radius:6px;padding:6px 8px;outline:none">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
          <div>
            <label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:3px">경과 영업일</label>
            <input id="mstTyElapsed" type="number" value="${tyElapsed ?? ''}" oninput="calcMgrRemainDays()" style="width:100%;font-size:13px;font-weight:600;border:1px solid #DDD;border-radius:6px;padding:6px 8px;outline:none">
          </div>
          <div>
            <label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:3px">남은 영업일 <span style="color:#7C3AED">(자동)</span></label>
            <input id="mstTyRemain" type="number" value="${tyRemain ?? ''}" readonly style="width:100%;font-size:13px;font-weight:600;border:1px solid #DDD;border-radius:6px;padding:6px 8px;outline:none;background:#EFEBFF;color:#7C3AED">
          </div>
        </div>
        <button onclick="saveManagerSalesTarget(${year}, ${month})" style="width:100%;padding:8px;background:#7C3AED;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">영업일수 저장</button>
      </div>
    </details>`;
  }

  // 데이터 없으면 안내
  if (!hasData) {
    const missingWhat = [];
    if (prevTotal == null) missingWhat.push('지난달 매출');
    if (tysSales == null) missingWhat.push('이번달 매출');
    html += `<div style="text-align:center;padding:40px 20px;color:#888780">
      <div style="font-size:48px;margin-bottom:12px">🛞</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">${year}년 ${month}월 데이터 부족</div>
      <div style="font-size:13px;color:#B4B2A9">${missingWhat.length > 0 ? missingWhat.join(', ') + ' 데이터가 아직 업로드되지 않았습니다.' : '영업일 데이터를 확인해 주세요.'}</div>
    </div>`;
    el.innerHTML = html;
    renderManagerChart();
    return;
  }

  // 계산
  const prevAvg = prevTotal / prevDays;
  const tyAvg = tysSales / tyElapsed;
  const totalDays = tyElapsed + tyRemain;
  const projected = tyAvg * totalDays;
  const projGrowth = prevTotal > 0 ? ((projected - prevTotal) / prevTotal) * 100 : 0;

  // 매출 요약 카드
  html += `<div style="background:#fff;border-radius:14px;border:1px solid #E8E6DF;padding:18px 16px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="flex:1;text-align:center">
        <div style="font-size:11px;color:#888780;margin-bottom:2px">지난달(${prevMon}월) 타이어 매출</div>
        <div style="font-size:16px;font-weight:800;color:#2C2C2A">${fmtMan(prevTotal)}</div>
      </div>
      <div style="font-size:18px;color:#B4B2A9">→</div>
      <div style="flex:1;text-align:center">
        <div style="font-size:11px;color:#888780;margin-bottom:2px">이번달(${month}월) 누적</div>
        <div style="font-size:16px;font-weight:800;color:#7C3AED">${fmtMan(tysSales)}</div>
      </div>
    </div>`;

  // 세부 매출 표시 (타이어 / 얼라이먼트)
  if (data.tireSales != null || data.alignmentSales != null) {
    html += `<div style="display:flex;justify-content:center;gap:12px;margin-bottom:8px;font-size:11px;color:#888780">
      <span>타이어: <strong style="color:#2C2C2A">${fmtMan(data.tireSales || 0)}</strong></span>
      <span>얼라인: <strong style="color:#2C2C2A">${fmtMan(data.alignmentSales || 0)}</strong></span>
    </div>`;
  }
  if (data.prevTireSales != null || data.prevAlignmentSales != null) {
    html += `<div style="display:flex;justify-content:center;gap:12px;margin-bottom:8px;font-size:10px;color:#B4B2A9">
      <span>지난달 타이어: ${fmtMan(data.prevTireSales || 0)}</span>
      <span>지난달 얼라인: ${fmtMan(data.prevAlignmentSales || 0)}</span>
    </div>`;
  }

  html += `<div style="text-align:center;font-size:12px;color:#888780">
      영업일: <strong style="color:#2C2C2A">${tyElapsed}일</strong> 경과 / <strong style="color:#7C3AED">${tyRemain}일</strong> 남음 (총 ${totalBizDays}일)
    </div>
  </div>`;

  // 일평균 & 예상 카드
  const growthIcon = projGrowth >= 0 ? '📈' : '📉';
  const growthColor = projGrowth >= 0 ? '#1D9E75' : '#E24B4A';
  html += `<div style="background:#fff;border-radius:14px;border:1px solid #E8E6DF;padding:18px 16px;margin-bottom:16px">
    <div style="font-size:15px;font-weight:800;color:#2C2C2A;margin-bottom:14px;text-align:center">🛞 일평균 & 예상</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="text-align:center;padding:12px;background:#F9FAFB;border-radius:10px">
        <div style="font-size:11px;color:#888780;margin-bottom:4px">지난달 일평균</div>
        <div style="font-size:17px;font-weight:800;color:#2C2C2A">${fmtMan(prevAvg)}</div>
      </div>
      <div style="text-align:center;padding:12px;background:#F3F0FF;border-radius:10px">
        <div style="font-size:11px;color:#888780;margin-bottom:4px">이번달 일평균</div>
        <div style="font-size:17px;font-weight:800;color:#7C3AED">${fmtMan(tyAvg)}</div>
      </div>
      <div style="text-align:center;padding:12px;background:#F9FAFB;border-radius:10px">
        <div style="font-size:11px;color:#888780;margin-bottom:4px">예상 총매출</div>
        <div style="font-size:17px;font-weight:800;color:#2C2C2A">${fmtMan(projected)}</div>
      </div>
      <div style="text-align:center;padding:12px;background:${projGrowth >= 0 ? '#E1F5EE' : '#FCEBEB'};border-radius:10px">
        <div style="font-size:11px;color:#888780;margin-bottom:4px">예상 성장률</div>
        <div style="font-size:17px;font-weight:800;color:${growthColor}">${growthIcon} ${projGrowth >= 0 ? '+' : ''}${projGrowth.toFixed(1)}%</div>
      </div>
    </div>
  </div>`;

  // 4 Stage 프로그레스바
  const stages = [
    { label: '지난달 동일 달성', growthPct: 0, color: '#6B7280', bg: '#F3F4F6' },
    { label: '지난달 대비 5% 성장', growthPct: 5, color: '#1D9E75', bg: '#E1F5EE' },
    { label: '지난달 대비 10% 성장', growthPct: 10, color: '#7C3AED', bg: '#F3F0FF' },
    { label: '지난달 대비 15% 성장', growthPct: 15, color: '#D97706', bg: '#FEF3C7' },
  ];

  function mgrCalcStage(growthPct) {
    const targetTotal = Math.round(prevTotal * (1 + growthPct / 100));
    const remainingSales = targetTotal - tysSales;
    const requiredDaily = tyRemain > 0 ? remainingSales / tyRemain : 0;
    const progress = Math.min(tysSales / targetTotal * 100, 100);
    const achieved = tysSales >= targetTotal;
    return { targetTotal, remainingSales, requiredDaily, progress, achieved };
  }

  function mgrFeasibility(requiredDaily, tyAvgVal) {
    if (requiredDaily <= 0) return { emoji: '🟢', text: '이미 달성!', color: '#1D9E75' };
    const ratio = requiredDaily / tyAvgVal;
    if (ratio <= 1.0) return { emoji: '🟢', text: '초과 달성 중', color: '#1D9E75' };
    if (ratio <= 1.1) return { emoji: '🟢', text: '페이스 유지', color: '#1D9E75' };
    if (ratio <= 1.3) return { emoji: '🟡', text: '약간 노력 필요', color: '#D97706' };
    if (ratio <= 1.5) return { emoji: '🟠', text: '상당한 노력 필요', color: '#E67E22' };
    return { emoji: '🔴', text: '매우 도전적', color: '#E24B4A' };
  }

  let highestAchievable = -1;
  stages.forEach((stage, idx) => {
    const s = mgrCalcStage(stage.growthPct);
    const f = mgrFeasibility(s.requiredDaily, tyAvg);
    if (s.achieved || f.color === '#1D9E75') highestAchievable = idx;

    const barWidth = Math.max(s.progress, 2);
    const barColor = s.achieved ? '#1D9E75' : stage.color;

    html += `<div style="background:#fff;border-radius:14px;border:1.5px solid ${s.achieved ? '#1D9E75' : stage.color};padding:16px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="background:${stage.color};color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px">Stage ${idx + 1}</span>
          <span style="font-size:13px;font-weight:700;color:#2C2C2A">${stage.label}</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <span style="font-size:14px">${f.emoji}</span>
          <span style="font-size:12px;font-weight:600;color:${f.color}">${f.text}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="font-size:13px;font-weight:700;color:${barColor};white-space:nowrap">${s.progress.toFixed(1)}%</div>
        <div style="flex:1;background:#F0F0F0;border-radius:6px;height:12px;overflow:hidden">
          <div style="width:${barWidth}%;height:100%;background:${barColor};border-radius:6px;transition:width 0.5s ease"></div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#888780">
        <div>목표: <span style="font-weight:700;color:#2C2C2A">${fmtBigWon(s.targetTotal)}</span></div>
        ${s.achieved
          ? '<div style="font-weight:700;color:#1D9E75">✅ 달성 완료!</div>'
          : `<div>남은 매출: <span style="font-weight:700;color:${stage.color}">${fmtBigWon(Math.max(s.remainingSales, 0))}</span></div>`
        }
      </div>
      ${!s.achieved && tyRemain > 0 ? `<div style="text-align:right;font-size:12px;color:#888780;margin-top:4px">일 필요 매출: <span style="font-weight:700;color:${stage.color}">${fmtMan(Math.round(Math.max(s.requiredDaily, 0)))}</span></div>` : ''}
    </div>`;
  });

  // 동기부여 메시지
  let motMsg = '';
  if (highestAchievable >= 3) {
    motMsg = '🔥 현재 페이스라면 Stage 4(15% 성장)까지 달성 가능! 최고의 달입니다!';
  } else if (highestAchievable >= 2) {
    motMsg = '💪 좋은 페이스! Stage 3(10% 성장) 달성이 보입니다. 조금만 더 힘내세요!';
  } else if (highestAchievable >= 1) {
    motMsg = '👍 5% 성장 달성 페이스 유지 중! 꾸준히 이어가면 더 높은 단계도 가능합니다.';
  } else if (highestAchievable >= 0) {
    motMsg = '📌 지난달 동일 달성이 목표입니다. 현재 페이스를 유지하세요!';
  } else {
    motMsg = `⚡ 아직 시작 단계입니다. 매일 ${fmtMan(tyAvg)} 페이스를 올려보세요!`;
  }

  html += `<div style="background:#FAEEDA;border:1.5px solid #FDE68A;border-radius:12px;padding:16px 18px;margin-top:4px;text-align:center">
    <div style="font-size:14px;font-weight:700;color:#92400E;line-height:1.6">${motMsg}</div>
    <div style="font-size:12px;color:#B45309;margin-top:6px">이번달 일평균 ${fmtMan(tyAvg)} · 지난달 일평균 ${fmtMan(prevAvg)}</div>
  </div>`;

  el.innerHTML = html;
  runCountUp(el);
  renderManagerChart();
}

function renderManagerChart() {
  if (managerMonthlyData && managerMonthlyData.length > 0) {
    if (chartInstances.manager) chartInstances.manager.destroy();
    // 타이어+얼라이먼트 합산 매출 차트
    chartInstances.manager = createStockChart('managerChart',
      managerMonthlyData.map(m => m.month),
      managerMonthlyData.map(m => (m.tireSales || 0) + (m.alignmentSales || 0)),
      {
        color: '#5B9BD5',
        yFormat: v => (v/1e8).toFixed(1) + '억', tipFormat: v => fmtWon(v), label: '타이어 매출',
      }
    );
  }
}

function calcMgrRemainDays() {
  const total = parseInt(document.getElementById('mstTotalDays')?.value) || 0;
  const elapsed = parseInt(document.getElementById('mstTyElapsed')?.value) || 0;
  const remainEl = document.getElementById('mstTyRemain');
  if (remainEl) remainEl.value = Math.max(total - elapsed, 0);
}

async function saveManagerSalesTarget(year, month) {
  const lyDays = parseInt(document.getElementById('mstLyDays').value);
  const tyElapsed = parseInt(document.getElementById('mstTyElapsed').value);
  const tyRemain = parseInt(document.getElementById('mstTyRemain').value);

  if (!lyDays || !tyElapsed || tyRemain == null) {
    alert('영업일수를 입력해 주세요.');
    return;
  }

  try {
    await api('/manager-sales-target/' + year + '/' + month, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lyDays, tyElapsed, tyRemain }),
    });
    alert('저장 완료');
    loadManagerData();
  } catch (e) {
    alert('저장 실패: ' + (e.message || e));
  }
}

let directorMonthlyData = null;
async function loadDirectorInit() {
  try {
    await getConfigs();
    // directorMonthlyData 차트용으로 로드
    if (!directorMonthlyData) {
      try { directorMonthlyData = await api('/director/monthly'); } catch(e) { directorMonthlyData = []; }
    }
    const now = new Date();
    const curYear = now.getFullYear();
    const curMonth = now.getMonth() + 1;
    // 연도 셀렉터
    const yearSel = document.getElementById('directorYearSel');
    if (yearSel.options.length === 0) {
      [curYear - 1, curYear, curYear + 1].forEach(y => {
        const opt = document.createElement('option');
        opt.value = y; opt.textContent = y + '년';
        if (y === curYear) opt.selected = true;
        yearSel.appendChild(opt);
      });
    }
    // 월 셀렉터
    const monthSel = document.getElementById('directorMonthSel');
    if (monthSel.options.length === 0) {
      for (let m = 1; m <= 12; m++) {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m + '월';
        if (m === curMonth) opt.selected = true;
        monthSel.appendChild(opt);
      }
    }
    loadDirectorData();
  } catch (e) { document.getElementById('directorContent').innerHTML = '<p style="color:var(--red)">데이터 로드 실패</p>'; }
}

async function loadDirectorData() {
  const year = parseInt(document.getElementById('directorYearSel').value);
  const month = parseInt(document.getElementById('directorMonthSel').value);
  if (!year || !month) return;
  const el = document.getElementById('directorContent');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>로딩 중...</div>';
  try {
    const data = await api('/sales-target/' + year + '/' + month);
    renderSalesTargetDashboard(data, el, year, month);
  } catch (e) { el.innerHTML = '<p style="color:var(--red)">데이터 로드 실패</p>'; }
}

function renderSalesTargetDashboard(data, el, year, month) {

  const lyTotal = data.lyTotal;
  const lyDays = data.lyDays;
  const tysSales = data.tysSales;
  const tyElapsed = data.tyElapsed;
  const tyRemain = data.tyRemain;
  const customPct1 = 10;
  const customPct2 = 15;
  const totalBizDays = data.totalBusinessDays || (tyElapsed + tyRemain);
  const hasData = lyTotal != null && lyDays != null && tysSales != null && tyElapsed != null && lyDays > 0 && tyElapsed > 0;

  let html = '';

  // 차트 (맨 위)
  html += `<div class="card"><div class="card-title">월별 매출 추이</div><div class="chart-wrap"><canvas id="directorChart"></canvas></div></div>`;

    html += `<details style="margin-bottom:16px">

      <div style="background:#F8F5FF;border:1.5px solid #7C3AED;border-top:none;border-radius:0 0 10px 10px;padding:14px">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px">
          <div>
            <label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:3px">작년 영업일</label>
            <input id="stLyDays" type="number" value="${lyDays ?? ''}" style="width:100%;font-size:13px;font-weight:600;border:1px solid #DDD;border-radius:6px;padding:6px 8px;outline:none">

          <div>

          <div>
