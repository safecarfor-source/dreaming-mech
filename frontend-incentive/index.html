function renderSalesTargetDashboard(data, el, year, month) {
  const isAdmin = currentUser.role === 'admin';

  const lyTotal = data.lyTotal;
  const lyDays = data.lyDays;
  const tysSales = data.tysSales;
  const tyElapsed = data.tyElapsed;
  const tyRemain = data.tyRemain;
  const totalBizDays = data.totalBusinessDays || (tyElapsed + tyRemain);
  const hasData = lyTotal != null && lyDays != null && tysSales != null && tyElapsed != null && lyDays > 0 && tyElapsed > 0;

  let html = '';

  // 영업일수 읽기전용 표시
  if (tyElapsed != null || tyRemain != null) {
    html += `<div style="margin-bottom:12px;padding:10px 14px;background:#F9FAFB;border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text-muted);font-weight:600">
      경과 ${tyElapsed ?? '-'}일 / 남은 ${tyRemain ?? '-'}일
    </div>`;
  }

  // 데이터 없으면 안내
  if (!hasData) {
    const missingWhat = [];
    if (lyTotal == null) missingWhat.push('작년 매출');
    if (tysSales == null) missingWhat.push('올해 매출');
    html += `<div style="text-align:center;padding:40px 20px;color:var(--text-muted)">
      <div style="font-size:48px;margin-bottom:12px">📊</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">${year}년 ${month}월 데이터 부족</div>
      <div style="font-size:13px;color:var(--text-light)">${missingWhat.length > 0 ? missingWhat.join(', ') + ' 데이터가 아직 업로드되지 않았습니다.' : '영업일 데이터를 확인해 주세요.'}</div>
    </div>`;
    el.innerHTML = html;
    renderDirectorChart();
    return;
  }

  // 계산
  const lyAvg = lyTotal / lyDays;
  const tyAvg = tysSales / tyElapsed;
  const totalDays = tyElapsed + tyRemain;

  const tiers = [
    { label: '5% 이상 하락', threshold: -5, rate: 0.3 },
    { label: '0~5% 하락',   threshold: 0,  rate: 0.5 },
    { label: '0~5% 성장',   threshold: 5,  rate: 0.6 },
    { label: '5~8% 성장',   threshold: 8,  rate: 0.7 },
    { label: '8% 이상 성장', threshold: 999, rate: 0.9 },
  ];
  const tierThresholds = [-Infinity, -5, 0, 5, 8];

  function getCurrentTierIdx(growthRate) {
    if (growthRate <= -5) return 0;
    if (growthRate <= 0) return 1;
    if (growthRate <= 5) return 2;
    if (growthRate <= 8) return 3;
    return 4;
  }

  const currentGrowth = lyTotal > 0 ? ((tysSales - lyTotal) / lyTotal) * 100 : 0;
  const currentTierIdx = getCurrentTierIdx(currentGrowth);
  const currentTier = tiers[currentTierIdx];
  const currentIncentive = Math.round(tysSales * currentTier.rate / 100);
  const lyMonth = year - 1;

  // ===== 새 카드 레이아웃 =====
  html += `<div class="nc-wrap">`;

  // 이름
  html += `<div class="nc-name">이정석</div>`;

  // Box 1: 그래프
  html += `<div class="nc-box">
    <div class="nc-box-title">월별 매출 추이</div>
    <div class="nc-chart-wrap"><canvas id="directorChart"></canvas></div>
  </div>`;

  // Box 2: 총 인센티브
  html += `<div class="nc-box">
    <div class="nc-box-title">총 인센티브</div>
    <div class="nc-big-num">💵 ${fmtWon(currentIncentive)}</div>
    <table class="nc-table" style="margin-top:12px">
      <tr><td>올해 매출</td><td>${fmtWon(tysSales)}</td></tr>
      <tr><td>작년 매출</td><td>${fmtWon(lyTotal)}</td></tr>
      <tr><td>성장률</td><td style="color:${currentGrowth >= 0 ? '#10B981' : '#EF4444'};font-weight:700">${currentGrowth >= 0 ? '+' : ''}${currentGrowth.toFixed(1)}%</td></tr>
      <tr><td>적용 요율 (${currentTier.label})</td><td>${currentTier.rate}%</td></tr>
      <tr class="nc-total"><td>총 지급 예정액</td><td>${fmtWon(currentIncentive)}</td></tr>
    </table>
  </div>`;

  // Box 3: 이번 달 매출 예측
  const projected = Math.round(tyAvg * totalBizDays);
  const projectedGrowth = lyTotal > 0 ? ((projected - lyTotal) / lyTotal * 100) : 0;
  const progressPct = lyTotal > 0 ? Math.min((tysSales / lyTotal * 100), 150).toFixed(1) : 0;
  const timePct = (tyElapsed / totalBizDays * 100).toFixed(0);
  // 예상 레벨 계산
  function getPredictedLv(growth) {
    const lvMap = [{g: -5, lv: 'Lv.-10', rate: 0.3}, {g: 0, lv: 'Lv.-5', rate: 0.5}, {g: 5, lv: 'Lv.1', rate: 0.6}, {g: 8, lv: 'Lv.5', rate: 0.7}, {g: Infinity, lv: 'Lv.10', rate: 0.9}];
    if (growth <= -5) return lvMap[0];
    if (growth <= 0) return lvMap[1];
    if (growth <= 5) return lvMap[2];
    if (growth <= 8) return lvMap[3];
    return lvMap[4];
  }
  const predLv = getPredictedLv(projectedGrowth);
  const predIncentive = Math.round(projected * predLv.rate / 100);
  const barWidth = Math.min(parseFloat(progressPct), 100);
  const isAhead = parseFloat(progressPct) >= parseFloat(timePct);
  const projectedBarWidth = lyTotal > 0 ? Math.min(projected / lyTotal * 100, 100) : 0;

  html += `<div class="nc-box">
    <div class="nc-box-title">이번 달 매출 예측</div>
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:4px">
        <span>작년 대비 진행률</span>
        <span style="font-weight:700;color:${isAhead ? '#10B981' : '#EF4444'}">${progressPct}%</span>
      </div>
      <div style="position:relative">
        <div style="height:12px;background:#eee;border-radius:8px;overflow:hidden">
          <div style="height:100%;width:${barWidth}%;background:${isAhead ? 'linear-gradient(90deg,#3EA6FF,#10B981)' : 'linear-gradient(90deg,#3EA6FF,#EF4444)'};border-radius:8px;transition:width 0.5s"></div>
        </div>
        <div style="position:absolute;top:-3px;left:${projectedBarWidth}%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;pointer-events:none">
          <div style="width:2px;height:18px;background:#000;border-radius:1px"></div>
          <div style="font-size:9px;font-weight:700;color:#000;white-space:nowrap;margin-top:1px">예상 ${predLv.lv}</div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#999;margin-top:16px">
        <span>현재 ${fmtBigWon(tysSales)}</span>
        <span>작년 ${fmtBigWon(lyTotal)}</span>
      </div>
    </div>
    <div style="background:#F9FAFB;border-radius:12px;padding:16px;text-align:center">
      <div style="font-size:24px;font-weight:900;color:#000;margin-bottom:6px">일 평균 ${fmtMan(tyAvg)}원 매출 시</div>
      <div style="font-size:17px;color:#666;margin-bottom:4px">예상 인센티브: <b>${fmtBigWon(predIncentive)}</b></div>
      <div style="font-size:17px;font-weight:700;color:${projectedGrowth >= 0 ? '#10B981' : '#EF4444'};margin-bottom:4px">
        작년 대비 ${projectedGrowth >= 0 ? '+' : ''}${projectedGrowth.toFixed(1)}% → ${predLv.lv}
      </div>
    </div>
    <div style="text-align:center;margin-top:10px;font-size:12px;color:${isAhead ? '#10B981' : '#EF4444'};font-weight:600">
      ${isAhead ? '👍 시간 대비 앞서가는 중!' : '⚡ 페이스업 필요! 일평균 ' + fmtMan(lyAvg) + ' 이상 목표'}
    </div>
  </div>`;

  // 목표 레벨 인덱스 (Box 4 + Box 5 공용)
  const savedLvIdx = localStorage.getItem('directorTargetLv') || '2';
  const defaultIdx = parseInt(savedLvIdx);

  // Box 4: 일평균 매출 목표 (레벨 선택 가능)
  if (tyRemain > 0) {
    const tierLvNames = ['Lv.-10', 'Lv.-5', 'Lv.1', 'Lv.5', 'Lv.10'];

    // 각 레벨별 데이터 미리 계산 (JSON으로 넘김)
    const lvData = tiers.map((t, i) => {
      const thres = tierThresholds[i];
      const target = (thres === -Infinity) ? 0 : Math.round(lyTotal * (1 + thres / 100));
      const remain = target - tysSales;
      const daily = remain > 0 ? Math.round(remain / tyRemain) : 0;
      const achieved = tysSales >= target;
      return { target, remain, daily, achieved, rate: t.rate };
    });
    const cur = lvData[defaultIdx];

    html += `<div class="nc-box" style="text-align:center">
      <div class="nc-box-title">일평균 매출 목표</div>
      <div class="nc-split" style="border-top:none">
        <div style="border-right:1px solid #000">
          <div class="nc-split-label">현재 일평균</div>
          <div class="nc-split-value">${fmtMan(tyAvg)}</div>
        </div>
        <div>
          <div class="nc-split-label" style="display:flex;align-items:center;justify-content:center;gap:4px">
            <select id="targetLvSelect" onchange="updateTargetLv(this.value)" style="font-size:12px;font-weight:700;border:1.5px solid #000;border-radius:8px;padding:2px 6px;background:#fff;color:#000;cursor:pointer">
              ${tierLvNames.map((name, i) => `<option value="${i}" ${i === defaultIdx ? 'selected' : ''}>${name}</option>`).join('')}
            </select>
            <span>달성 목표</span>
          </div>
          <div class="nc-split-value" id="targetLvDaily" style="color:#3EA6FF">${cur.achieved ? '달성!' : fmtMan(cur.daily) + '/일'}</div>
        </div>
      </div>
    </div>`;

    // 레벨 변경 핸들러를 전역에 등록
    window._directorLvData = lvData;
    window._directorLvNames = tierLvNames;
    window._directorTyRemain = tyRemain;
    window.updateTargetLv = function(idx) {
      idx = parseInt(idx);
      localStorage.setItem('directorTargetLv', idx);
      const d = window._directorLvData[idx];
      const name = window._directorLvNames[idx];
      const remain = window._directorTyRemain;
      document.getElementById('targetLvDaily').textContent = d.achieved ? '달성!' : fmtMan(d.daily) + '/일';
    };
  }

  // Box 5: 오늘의 목표
  if (tyRemain > 0) {
    html += `<div class="nc-box">
      <div class="nc-box-title">오늘의 목표</div>`;
    const tierLevels = [-10, -5, 1, 5, 10];
    tiers.forEach((tier, idx) => {
      const thres = tierThresholds[idx];
      // 5% 이상 하락 (tier 0): 기본 달성 (매출 있으면 무조건)
      const tierTarget = (thres === -Infinity) ? 0 : Math.round(lyTotal * (1 + thres / 100));
      const isAchieved = tysSales >= tierTarget;
      const remain = tierTarget - tysSales;
      const dailyNeeded = isAchieved ? 0 : Math.round(remain / tyRemain);
      const tierIncentive = (thres === -Infinity) ? Math.round(lyTotal * 0.95 * tier.rate / 100) : Math.round(tierTarget * tier.rate / 100);
      const lvLabel = 'Lv.' + tierLevels[idx];
      const isTarget = idx === defaultIdx;

      html += `<div class="nc-goal-item" style="${isTarget && !isAchieved ? 'border-color:#3EA6FF;border-width:2px;background:rgba(62,166,255,0.05)' : isAchieved ? 'background:linear-gradient(135deg,rgba(62,166,255,0.08),rgba(16,185,129,0.08));border-color:#10B981' : ''}">
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0">
          ${isTarget ? '<div style="font-size:12px;line-height:1">👑</div>' : ''}
          <div class="nc-goal-num ${isAchieved ? 'done' : ''}" style="${isAchieved ? 'background:linear-gradient(135deg,#3EA6FF,#10B981);border-color:#10B981' : isTarget ? 'border-color:#3EA6FF;color:#3EA6FF' : ''}">${isAchieved ? '완료' : lvLabel}</div>
          ${isTarget ? '<div style="font-size:8px;font-weight:800;color:#3EA6FF;letter-spacing:-0.5px">목표</div>' : ''}
        </div>
        <div class="nc-goal-info">
          <div class="nc-goal-label" style="${isAchieved ? 'color:#10B981' : ''}">매출 ${tier.label}<br>→ 인센티브 비율 ${tier.rate}%</div>
          <div class="nc-goal-sub" style="${isAchieved ? 'color:#10B981' : ''}">${isAchieved ? '달성 완료' : '하루 매출 ' + fmtMan(dailyNeeded) + ' 달성 시 가능'}</div>
        </div>
        <div class="nc-goal-right">
          <div class="nc-goal-val">${fmtBigWon(tierIncentive)}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`; // nc-wrap 끝

  el.innerHTML = html;
  renderDirectorChart();
}

function renderDirectorChart() {
  if (directorMonthlyData && directorMonthlyData.length > 0) {
    if (chartInstances.director) chartInstances.director.destroy();
    chartInstances.director = createStockChart('directorChart',
      directorMonthlyData.map(m => m.month),
      directorMonthlyData.map(m => m.totalRevenue),
      {
        color: '#3EA6FF',
        yFormat: v => (v/1e8).toFixed(1) + '억', tipFormat: v => fmtWon(v), label: '매출',
      }
    );
  }
}

// ===== 마스터 인사이트 =====
let insightLoaded = false;
async function loadInsight() {
  const el = document.getElementById('insightContent');
  if (insightLoaded) return;
  el.innerHTML = '<div class="loading"><div class="spinner"></div>인사이트 로딩 중...</div>';

  try {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth() + 1;

    // 병렬 데이터 로드
    const [summary, dirMonthly, salesTarget] = await Promise.all([
      api(`/dashboard/summary/${year}/${month}`),
      api('/director/monthly'),
      api(`/sales-target/${year}/${month}`),
    ]);

    // 최근 6개월 CashFlow
    const cfRequests = [];
    let cy = year, cm = month;
    for (let i = 0; i < 6; i++) {
      cfRequests.push(api(`/cashflow/${cy}/${cm}`).catch(() => ({ year: cy, month: cm, cash: 0, investment: 0, inventory: 0, totalAssets: 0 })));
      cm--; if (cm === 0) { cm = 12; cy--; }
    }
    const cashflows = (await Promise.all(cfRequests)).reverse();

    el.innerHTML = renderInsightDashboard(summary, dirMonthly, salesTarget, cashflows, year, month);
    insightLoaded = true;
  } catch (e) {
    el.innerHTML = `<div class="nc-box"><p style="color:var(--red)">인사이트 로드 실패: ${e.message}</p></div>`;
  }
}

function renderInsightDashboard(summary, dirMonthly, salesTarget, cashflows, year, month) {
  let html = '';

  // ===== 매출 분석 =====
  html += `<div class="nc-box-title" style="font-size:20px;font-weight:900;margin-bottom:4px">📊 매출 분석</div>`;
  html += `<div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">${year}년 ${month}월 기준</div>`;

  // 카드 1: 이번 달 매출 요약 (2x2 그리드)
  const rev = summary.revenue || {};
  const totalRev = rev.total || 0;
  const pmChange = summary.prevMonth?.change || 0;
  const pyChange = summary.prevYear?.change || 0;
  const elapsed = salesTarget?.tyElapsed || 1;
  const dailyAvg = Math.round(totalRev / elapsed);

  html += `<div class="nc-box">
    <div class="nc-box-title" style="font-size:16px">${month}월 매출 요약</div>
    <div class="mi-stat-grid">
      <div class="mi-stat-card">
        <div class="mi-stat-label">총 매출</div>
        <div class="mi-stat-value">${fmtBigWon(totalRev)}</div>
      </div>
      <div class="mi-stat-card">
        <div class="mi-stat-label">일평균 매출</div>
        <div class="mi-stat-value">${fmtMan(dailyAvg)}원</div>
        <div class="mi-stat-sub" style="color:#888">${elapsed}일 경과</div>
      </div>
      <div class="mi-stat-card">
        <div class="mi-stat-label">전월 대비</div>
        <div class="mi-stat-value" style="color:${pmChange >= 0 ? 'var(--green)' : 'var(--red)'}">${pmChange >= 0 ? '+' : ''}${pmChange}%</div>
      </div>
      <div class="mi-stat-card">
        <div class="mi-stat-label">전년 동월 대비</div>
        <div class="mi-stat-value" style="color:${pyChange >= 0 ? 'var(--green)' : 'var(--red)'}">${pyChange >= 0 ? '+' : ''}${pyChange}%</div>
      </div>
    </div>
  </div>`;

  // 카드 2: 월별 매출 추이 (최근 12개월 CSS 바 차트)
  const recent12 = (dirMonthly || []).slice(-12);
  if (recent12.length > 0) {
    const maxRev = Math.max(...recent12.map(m => m.totalRevenue || 0));
    html += `<div class="nc-box">
      <div class="nc-box-title" style="font-size:16px">월별 매출 추이</div>`;
    recent12.forEach(m => {
      const pct = maxRev > 0 ? ((m.totalRevenue || 0) / maxRev * 100) : 0;
      const label = (m.month || '').replace('년 ', '.').replace('월', '');
      const isThisMonth = m.month === `${year - 2000}년 ${month}월`;
      html += `<div class="mi-bar-row">
        <span class="mi-bar-label">${label}</span>
        <div class="mi-bar-track">
          <div class="mi-bar-fill" style="width:${pct}%;background:${isThisMonth ? 'var(--accent)' : '#3EA6FF'}"></div>
        </div>
        <span class="mi-bar-value">${fmtBigWon(m.totalRevenue || 0)}</span>
      </div>`;
    });
    html += `</div>`;
  }

  // 카드 3: 전년 동월 비교 (최근 3개월)
  const thisYearMonths = (dirMonthly || []).filter(m => (m.month || '').startsWith(`${year - 2000}년`));
  const recent3 = thisYearMonths.slice(-3);
  if (recent3.length > 0) {
    html += `<div class="nc-box">
      <div class="nc-box-title" style="font-size:16px">전년 동월 비교</div>`;
    recent3.forEach(m => {
      const mn = extractMonthNum(m.month);
      const ly = LAST_YEAR_REVENUE[mn] || 0;
      const ty = m.totalRevenue || 0;
      const max = Math.max(ly, ty, 1);
      const growPct = ly > 0 ? ((ty - ly) / ly * 100).toFixed(1) : 'N/A';
      const isUp = Number(growPct) >= 0;
      html += `<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:14px;font-weight:700">${mn}월</span>
          <span style="font-size:13px;font-weight:700;color:${isUp ? 'var(--green)' : 'var(--red)'}">${isUp ? '▲' : '▼'} ${growPct}%</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span style="width:35px;font-size:10px;color:#999">작년</span>
          <div style="flex:1;height:18px;background:#E8E8E8;border-radius:5px;overflow:hidden">
            <div style="width:${ly/max*100}%;height:100%;background:#CBD5E1;border-radius:5px"></div>
          </div>
          <span style="width:85px;font-size:11px;text-align:right;color:#666">${fmtBigWon(ly)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="width:35px;font-size:10px;color:#999">올해</span>
          <div style="flex:1;height:18px;background:#E8E8E8;border-radius:5px;overflow:hidden">
            <div style="width:${ty/max*100}%;height:100%;background:${isUp ? 'var(--green)' : 'var(--red)'};border-radius:5px"></div>
          </div>
          <span style="width:85px;font-size:11px;text-align:right;font-weight:600">${fmtBigWon(ty)}</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // 카드 4: 매출 구성 (정비/타이어/얼라인/기타)
  const serviceItems = rev.serviceItems || 0;
  const tire = rev.tire || 0;
  const alignment = rev.alignment || 0;
  const other = rev.other || 0;
  const compData = [
    { label: '정비', value: serviceItems, color: '#3EA6FF' },
    { label: '타이어', value: tire, color: '#10B981' },
    { label: '얼라인', value: alignment, color: '#FFB020' },
    { label: '기타', value: other, color: '#CBD5E1' },
  ];
  if (totalRev > 0) {
    html += `<div class="nc-box">
      <div class="nc-box-title" style="font-size:16px">매출 구성</div>
      <div class="mi-comp-bar">`;
    compData.forEach(d => {
      const pct = totalRev > 0 ? (d.value / totalRev * 100) : 0;
      if (pct > 0.5) html += `<div style="width:${pct}%;background:${d.color}" title="${d.label}"></div>`;
    });
    html += `</div><div class="mi-comp-legend">`;
    compData.forEach(d => {
      const pct = totalRev > 0 ? (d.value / totalRev * 100).toFixed(1) : '0';
      html += `<span><span class="mi-comp-dot" style="background:${d.color}"></span>${d.label} ${pct}% (${fmtBigWon(d.value)})</span>`;
    });
    html += `</div></div>`;
  }

  // 카드 5: 연간 누적 (YTD)
  const ytdTotal = thisYearMonths.reduce((sum, m) => sum + (m.totalRevenue || 0), 0);
  const ytdCount = thisYearMonths.length;
  let lyYtd = 0;
  for (let i = 1; i <= ytdCount; i++) lyYtd += LAST_YEAR_REVENUE[i] || 0;
  const ytdGrowth = lyYtd > 0 ? ((ytdTotal - lyYtd) / lyYtd * 100).toFixed(1) : '0';
  const ytdIsUp = Number(ytdGrowth) >= 0;

  html += `<div class="nc-box">
    <div class="nc-box-title" style="font-size:16px">연간 누적 (YTD)</div>
    <div class="mi-stat-grid">
      <div class="mi-stat-card">
        <div class="mi-stat-label">${year}년 누적 (${ytdCount}개월)</div>
        <div class="mi-stat-value">${fmtBigWon(ytdTotal)}</div>
      </div>
      <div class="mi-stat-card">
        <div class="mi-stat-label">${year-1}년 동기 누적</div>
        <div class="mi-stat-value">${fmtBigWon(lyYtd)}</div>
        <div class="mi-stat-sub" style="color:${ytdIsUp ? 'var(--green)' : 'var(--red)'}">${ytdIsUp ? '▲' : '▼'} ${ytdGrowth}%</div>
      </div>
    </div>
  </div>`;

  // ===== 현금 흐름표 =====
  html += `<div class="mi-section-gap"></div>`;
  html += `<div class="nc-box-title" style="font-size:20px;font-weight:900;margin-bottom:4px">💰 현금 흐름표</div>`;
  html += `<div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">${year}년 ${month}월 기준</div>`;

  // 카드 6: 이번 달 자산 현황
  const cf = summary.cashflow || {};
  const totalAssets = cf.totalAssets || 0;
  const cfCash = cf.cash || 0;
  const cfInv = cf.investment || 0;
  const cfStock = cf.inventory || 0;

  html += `<div class="nc-box">
    <div class="nc-box-title" style="font-size:16px">자산 현황</div>
    <div style="text-align:center;margin:12px 0">
      <div style="font-size:13px;color:#888">총 자산</div>
      <div style="font-size:28px;font-weight:900;color:#111">${fmtBigWon(totalAssets)}</div>
    </div>`;

  if (totalAssets > 0) {
    html += `<div class="mi-asset-stack">
      <div style="width:${cfCash/totalAssets*100}%;background:#3EA6FF" title="현금"></div>
      <div style="width:${cfInv/totalAssets*100}%;background:#10B981" title="투자"></div>
      <div style="width:${cfStock/totalAssets*100}%;background:#FFB020" title="재고"></div>
    </div>
    <div class="mi-comp-legend" style="margin-bottom:12px">
      <span><span class="mi-comp-dot" style="background:#3EA6FF"></span>현금 ${(cfCash/totalAssets*100).toFixed(1)}%</span>
      <span><span class="mi-comp-dot" style="background:#10B981"></span>투자 ${(cfInv/totalAssets*100).toFixed(1)}%</span>
      <span><span class="mi-comp-dot" style="background:#FFB020"></span>재고 ${(cfStock/totalAssets*100).toFixed(1)}%</span>
    </div>`;
  }

  html += `<table style="width:100%;font-size:13px;border-collapse:collapse">
    <tr style="border-bottom:1px solid #eee"><td style="padding:8px 0;color:#666">현금</td><td style="padding:8px 0;text-align:right;font-weight:600">${fmtBigWon(cfCash)}</td></tr>
    <tr style="border-bottom:1px solid #eee"><td style="padding:8px 0;color:#666">투자자산 (증권)</td><td style="padding:8px 0;text-align:right;font-weight:600">${fmtBigWon(cfInv)}</td></tr>
    <tr><td style="padding:8px 0;color:#666">타이어 재고</td><td style="padding:8px 0;text-align:right;font-weight:600">${fmtBigWon(cfStock)}</td></tr>
  </table>
  </div>`;

  // 카드 7: 전월 대비 변동
  if (cf.prevMonth) {
    const cashChg = cf.prevMonth.cashChange || 0;
    const assetChg = cf.prevMonth.assetChange || 0;
    html += `<div class="nc-box">
      <div class="nc-box-title" style="font-size:16px">전월 대비 변동</div>
      <div class="mi-stat-grid">
        <div class="mi-stat-card">
          <div class="mi-stat-label">현금 변동</div>
          <div class="mi-stat-value" style="font-size:18px;color:${cashChg >= 0 ? 'var(--green)' : 'var(--red)'}">
            ${cashChg >= 0 ? '+' : ''}${fmtBigWon(cashChg)}
          </div>
        </div>
        <div class="mi-stat-card">
          <div class="mi-stat-label">총 자산 변동</div>
          <div class="mi-stat-value" style="font-size:18px;color:${assetChg >= 0 ? 'var(--green)' : 'var(--red)'}">
            ${assetChg >= 0 ? '+' : ''}${fmtBigWon(assetChg)}
          </div>
        </div>
      </div>
    </div>`;
  }

  // 카드 8: 자산 월별 추이 (6개월 스택 바)
  const validCf = (cashflows || []).filter(c => c && c.totalAssets > 0);
  if (validCf.length > 1) {
    const maxAsset = Math.max(...validCf.map(c => c.totalAssets));
    html += `<div class="nc-box">
      <div class="nc-box-title" style="font-size:16px">자산 월별 추이</div>`;
    validCf.forEach(c => {
      const label = `${(c.year || 0) % 100}.${c.month}`;
      const totalPct = maxAsset > 0 ? (c.totalAssets / maxAsset * 100) : 0;
      const cashPct = c.totalAssets > 0 ? (c.cash / c.totalAssets * 100) : 0;
      const invPct = c.totalAssets > 0 ? (c.investment / c.totalAssets * 100) : 0;
      const stockPct = c.totalAssets > 0 ? (c.inventory / c.totalAssets * 100) : 0;
      html += `<div class="mi-bar-row">
        <span class="mi-bar-label">${label}</span>
        <div class="mi-bar-track">
          <div style="display:flex;height:100%;width:${totalPct}%">
            <div style="width:${cashPct}%;background:#3EA6FF"></div>
            <div style="width:${invPct}%;background:#10B981"></div>
            <div style="width:${stockPct}%;background:#FFB020"></div>
          </div>
        </div>
        <span class="mi-bar-value">${fmtBigWon(c.totalAssets)}</span>
      </div>`;
    });
    html += `<div class="mi-comp-legend" style="margin-top:8px">
      <span><span class="mi-comp-dot" style="background:#3EA6FF"></span>현금</span>
      <span><span class="mi-comp-dot" style="background:#10B981"></span>투자</span>
      <span><span class="mi-comp-dot" style="background:#FFB020"></span>재고</span>
    </div></div>`;
  }

  return html;
}

    let html = `<h2 style="font-size:18px;font-weight:700;color:var(--text);margin:0 0 4px">월말결산</h2>

    const dirTierIdx = getDirTierIdx(dirGrowthRate);
    const dirCurTier = DIR_TIERS[dirTierIdx];
    const dirIncentiveCalc = Math.round(dirRevenue * dirCurTier.rate / 100);

    const dirExtras = (dirData?.extras?.wiper?.incentive || 0) + (dirData?.extras?.battery?.incentive || 0) + (dirData?.extras?.acFilter?.incentive || 0);
    const dirTotalPay = dirIncentiveCalc + dirExtras;

    html += `<div class="card" style="margin-bottom:12px">
      <div class="card-title" style="margin-bottom:4px">이정석 부장</div>
      <div style="font-size:11px;color:var(--text-light);margin-bottom:12px">농협 172190-51-011452</div>

// ===== 자동 계산 (업로드 탭 대체) =====
async function manualRecalc() {
  const el = document.getElementById('recalcResult');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> 재계산 중...</div>';
  try {
    const res = await fetch(API + '/auto-calc/manual', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    const data = await res.json();
    if (data.skipped) {
      el.innerHTML = '<p style="color:var(--red)">해당 월 정비이력이 없습니다</p>';
    } else {
      el.innerHTML = `<p style="color:var(--green)">재계산 완료! 정비 ${data.repairCount?.toLocaleString()}건 | 총매출 ${data.totalRevenue?.toLocaleString()}원</p>`;
      loadAutoCalcHistory();
    }
  } catch (e) { el.innerHTML = '<p style="color:var(--red)">재계산 실패: ' + e.message + '</p>'; }
}

async function loadAutoCalcStatus() {
  const el = document.getElementById('autoCalcStatus');
  if (!el) return;
  try {
    const logs = await fetch(API + '/auto-calc/status', { headers: { 'Authorization': 'Bearer ' + token } }).then(r => r.json());
    if (logs.length === 0) {
      el.innerHTML = '<p style="font-size:13px;color:var(--text-light)">자동 계산 이력이 없습니다</p>';
      return;
    }
    const latest = logs[0];
    const detail = JSON.parse(latest.detail || '{}');
    const d = new Date(latest.editedAt);
    const timeStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    el.innerHTML = `<div style="padding:12px;background:var(--green-light);border-radius:8px;font-size:13px">
      마지막 자동 계산: <strong>${timeStr}</strong> | 정비 ${(detail.repairCount||0).toLocaleString()}건 | 총매출 ${(detail.totalRevenue||0).toLocaleString()}원
    </div>`;
  } catch (e) { el.innerHTML = ''; }
}

async function loadAutoCalcHistory() {
  const el = document.getElementById('uploadHistory');
  if (!el) return;
  try {
    const logs = await fetch(API + '/auto-calc/status', { headers: { 'Authorization': 'Bearer ' + token } }).then(r => r.json());
    if (logs.length === 0) { el.innerHTML = '<p style="font-size:13px;color:var(--text-light)">이력 없음</p>'; return; }
    let html = '<table class="data-table"><thead><tr><th>일시</th><th>정비 건수</th><th>총매출</th></tr></thead><tbody>';
    logs.slice(0, 10).forEach(log => {
      const detail = JSON.parse(log.detail || '{}');
      const d = new Date(log.editedAt);
      const timeStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
      html += `<tr><td>${timeStr}</td><td>${(detail.repairCount||0).toLocaleString()}건</td><td>${(detail.totalRevenue||0).toLocaleString()}원</td></tr>`;
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  } catch (e) { el.innerHTML = '<p style="color:var(--red)">이력 로드 실패</p>'; }
}

function initItemOrderDrag() {
  const list = document.getElementById('itemOrderList');
  if (!list) return;
  let dragEl = null;
  list.querySelectorAll('.order-item').forEach(item => {
    item.addEventListener('dragstart', e => { dragEl = item; item.style.opacity = '0.4'; });
    item.addEventListener('dragend', () => { dragEl.style.opacity = '1'; dragEl = null; list.querySelectorAll('.order-item').forEach(i => i.style.borderTop = ''); });
    item.addEventListener('dragover', e => { e.preventDefault(); if (dragEl && item !== dragEl) item.style.borderTop = '2px solid #3EA6FF'; });
    item.addEventListener('dragleave', () => { item.style.borderTop = ''; });
    item.addEventListener('drop', e => {
      e.preventDefault(); item.style.borderTop = '';
      if (dragEl && item !== dragEl) list.insertBefore(dragEl, item);
    });
  });
  // 터치 지원
  let touchEl = null, placeholder = null;
  list.addEventListener('touchstart', e => {
    const item = e.target.closest('.order-item');
    if (!item) return;
    touchEl = item;
    item.style.opacity = '0.4';
  }, {passive: true});
  list.addEventListener('touchmove', e => {
    if (!touchEl) return;
    e.preventDefault();
    const touch = e.touches[0];
    const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.order-item');
    list.querySelectorAll('.order-item').forEach(i => i.style.borderTop = '');
    if (target && target !== touchEl) target.style.borderTop = '2px solid #3EA6FF';
    placeholder = target;
  }, {passive: false});
  list.addEventListener('touchend', () => {
    if (touchEl) {
      touchEl.style.opacity = '1';
      if (placeholder && placeholder !== touchEl) list.insertBefore(touchEl, placeholder);
      list.querySelectorAll('.order-item').forEach(i => i.style.borderTop = '');
      touchEl = null; placeholder = null;
    }
  });
}

function toKrMonth(isoDate) {
  // "2026-03-14" → "26년 3월" (월만 추출, 인센티브 계산용)
  const parts = isoDate.split('-');
  return parts[0].slice(2) + '년 ' + parseInt(parts[1]) + '월';
}
function toKrDate(isoDate) {
  // "2026-03-14" → "26년 3월 14일"
  const [y, m, d] = isoDate.split('-');
  return y.slice(2) + '년 ' + parseInt(m) + '월 ' + parseInt(d) + '일';
}

async function loadQtyHistory() {
  const el = document.getElementById('qtyHistoryTable');
  if (!el) return;
  try {
    const resp = await api('/team/item-qty-history');
    // 새 API: { history: [...], targets: { "26년 3월": {brake_oil: 40, ...}, ... } }
    const historyData = resp.history || resp; // 하위호환
    const allTargets = resp.targets || {};
    const months = Array.isArray(historyData) ? historyData.map(d => d.month) : [];
    const itemKeys = Object.keys(ITEM_LABELS);

    // 선택된 월
    const raw = document.getElementById('minQtyMonth').value;
    const selMonth = raw ? toKrMonth(raw) : null;
    const existingTargets = (selMonth && allTargets[selMonth]) ? allTargets[selMonth] : {};

    // 이전 월
    let prevMonthLabel = '';
    let prevTargets = {};
    if (raw) {
      const [y, m] = raw.split('-');
      const prevDate = new Date(Number(y), Number(m) - 2, 1);
      const prevIso = prevDate.getFullYear() + '-' + String(prevDate.getMonth()+1).padStart(2,'0');
      prevMonthLabel = toKrMonth(prevIso);
      prevTargets = allTargets[prevMonthLabel] || {};
    }

    const hasPrev = Object.values(prevTargets).some(v => v > 0);
    let h = `<div style="overflow-x:auto"><table class="data-table" style="font-size:12px"><thead><tr><th>품목</th>`;
    months.forEach(m => {
      h += `<th class="num">${m}</th>`;
    });
    if (hasPrev) h += `<th class="num" style="background:#F0F0F0;color:var(--text-muted);font-weight:700;font-size:11px">${prevMonthLabel}<br>설정</th>`;
    h += `<th class="num" style="background:#EBF5FF;color:var(--accent);font-weight:700">${selMonth || ''}<br>최소수량</th></tr></thead><tbody>`;
    itemKeys.forEach(key => {
      h += `<tr><td style="font-weight:600;white-space:nowrap">${ITEM_LABELS[key]}</td>`;
      months.forEach(m => {
        const md = Array.isArray(historyData) ? historyData.find(d => d.month === m) : null;
        const qty = md && md.items[key] ? md.items[key] : 0;
        h += `<td class="num" style="${qty > 0 ? 'font-weight:600;color:var(--accent)' : 'color:#bbb'}">${qty}</td>`;
      });
      if (hasPrev) {
        const pv = prevTargets[key] || 0;
        h += `<td class="num" style="background:#F0F0F0;${pv > 0 ? 'font-weight:600;color:var(--text-muted)' : 'color:#bbb'}">${pv}</td>`;
      }
      const existVal = existingTargets[key] || 0;
      h += `<td class="num" style="background:#F9F5FF"><input type="number" min="0" value="${existVal}" id="minqty-${key}" style="width:55px;text-align:center;border:1px solid #D4B4FE;border-radius:6px;padding:4px;font-size:13px;font-weight:600;font-family:'Noto Sans KR'"></td>`;
      h += '</tr>';
    });
    h += '</tbody></table></div>';
    el.innerHTML = h;
  } catch (e) { el.innerHTML = '<p style="font-size:13px;color:var(--red)">수량 이력 로드 실패: ' + e.message + '</p>'; }
}

  if (gdVehicleState.loading) return;
  gdVehicleState.loading = true;
  const statusEl = document.getElementById('gdVehicleStatus');
  const listEl = document.getElementById('gdVehicleList');
  const moreEl = document.getElementById('gdVehicleMore');

  if (reset) {
    gdVehicleState.q = q;
    gdVehicleState.page = 1;
    gdVehicleState.items = [];
    listEl.innerHTML = '';
    moreEl.classList.remove('show');
  }

  statusEl.textContent = '검색 중...';
  statusEl.classList.add('show');

  try {
    const page = gdVehicleState.page;
    const data = await api('/gd/vehicles?q=' + encodeURIComponent(q) + '&page=' + page + '&limit=20');
    gdVehicleState.total = data.total || 0;
    const items = data.data || [];
    gdVehicleState.items = gdVehicleState.items.concat(items);

    if (gdVehicleState.items.length === 0) {
      statusEl.textContent = '검색 결과가 없습니다';
      statusEl.classList.add('show');
    } else {
      statusEl.classList.remove('show');
      items.forEach(v => listEl.insertAdjacentHTML('beforeend', gdVehicleCard(v)));
    }
    const loaded = gdVehicleState.items.length;
    moreEl.classList.toggle('show', loaded < gdVehicleState.total);
    if (loaded < gdVehicleState.total) moreEl.textContent = '더 보기 (' + loaded + '/' + gdVehicleState.total + ')';
    gdVehicleState.page++;
  } catch (e) {
    statusEl.textContent = '조회 실패: ' + e.message;
    statusEl.classList.add('show');
  }
  gdVehicleState.loading = false;
}

function gdVehicleLoadMore() {
  if (gdVehicleState.q) gdVehicleSearch(gdVehicleState.q, false);
}

function gdVehicleCard(v) {
  const id = 'gv-' + (v.code || v.plateNumber).replace(/\s/g, '_');
  return `<div class="gd-row" id="${id}" onclick="gdVehicleToggle('${id}','${encodeURIComponent(v.code || '')}')">
    <div class="gd-row-main vehicle">
      <div>
        <div class="gd-plate">${v.plateNumber || '-'}</div>
        <div class="gd-model">${[v.carModel, v.color, v.modelYear ? v.modelYear + '년' : ''].filter(Boolean).join(' · ') || '-'}</div>
      </div>
      <div></div>
      <div class="gd-owner">
        <div style="font-weight:600">${v.ownerName || '-'}</div>
        <div style="font-size:12px;color:var(--text-light)">${v.phone || ''}</div>
      </div>
    </div>
    <div class="gd-detail" id="${id}-detail">
      <div class="gd-repair-loading">불러오는 중...</div>

}

let gdVehicleOpenCode = null;
async function gdVehicleToggle(rowId, encodedCode) {
  const row = document.getElementById(rowId);
  const detail = document.getElementById(rowId + '-detail');
  const isOpen = detail.classList.contains('show');
  document.querySelectorAll('.gd-detail.show').forEach(d => d.classList.remove('show'));
  document.querySelectorAll('.gd-row.open').forEach(r => r.classList.remove('open'));
  if (isOpen) return;

  row.classList.add('open');
  detail.classList.add('show');
  const code = decodeURIComponent(encodedCode);
  if (!code) { detail.innerHTML = '<p style="font-size:13px;color:var(--text-muted);padding:8px 0">차량 코드 없음</p>'; return; }

  if (detail.dataset.loaded) return;
  detail.innerHTML = '<div class="gd-repair-loading">정비 이력 불러오는 중...</div>';

  try {
    let allRepairs = [];
    let repairPage = 1;
    let repairTotal = 0;

    const loadRepairs = async (pg) => {
      const data = await api('/gd/vehicles/' + encodeURIComponent(code) + '/repairs?page=' + pg + '&limit=20');
      repairTotal = data.total || 0;
      return data.repairs || [];
    };

    allRepairs = await loadRepairs(1);

    const renderRepairs = (repairs) => {
      if (repairs.length === 0) return '<p style="font-size:13px;color:var(--text-muted);padding:8px 0">정비 이력이 없습니다</p>';
      let h = `<div class="gd-repair-header"><span>날짜</span><span>품목</span><span>금액</span><span>주행</span></div>`;
      repairs.forEach(r => {
        const d = r.repairDate ? r.repairDate.slice(0, 10).replace(/-/g, '.') : '-';
        h += `<div class="gd-repair-row">
          <span class="gd-repair-date">${d}</span>
          <span class="gd-repair-item">${r.productName || '-'}</span>
          <span class="gd-repair-amt">${r.amount != null ? fmt(r.amount) + '원' : '-'}</span>
          <span class="gd-repair-km">${r.mileage != null ? fmt(r.mileage) + 'km' : '-'}</span>
        </div>`;
      });
      return h;
    };

    let currentRepairs = allRepairs;
    let currentPage = 1;

    const updateDetail = () => {
      const moreBtn = currentRepairs.length < repairTotal
        ? `<button class="gd-load-more show" id="${rowId}-rmore" onclick="gdRepairLoadMore('${rowId}','${encodeURIComponent(code)}')">더 보기 (${currentRepairs.length}/${repairTotal})</button>`
        : '';
      detail.innerHTML = renderRepairs(currentRepairs) + moreBtn;
      detail.dataset.loaded = '1';
      detail.dataset.page = String(currentPage);
      detail.dataset.total = String(repairTotal);
      detail.dataset.repairJson = JSON.stringify(currentRepairs);
    };

    updateDetail();
  } catch (e) {
    detail.innerHTML = '<p style="font-size:13px;color:var(--red);padding:8px 0">정비 이력 로드 실패</p>';
  }
}

async function gdRepairLoadMore(rowId, encodedCode) {
  const detail = document.getElementById(rowId + '-detail');
  const code = decodeURIComponent(encodedCode);
  const page = parseInt(detail.dataset.page || '1') + 1;
  const existing = JSON.parse(detail.dataset.repairJson || '[]');
  const total = parseInt(detail.dataset.total || '0');

  const btn = document.getElementById(rowId + '-rmore');
  if (btn) btn.textContent = '불러오는 중...';

  try {
    const data = await api('/gd/vehicles/' + encodeURIComponent(code) + '/repairs?page=' + page + '&limit=20');
    const newRepairs = data.repairs || [];
    const allRepairs = existing.concat(newRepairs);

    let h = `<div class="gd-repair-header"><span>날짜</span><span>품목</span><span>금액</span><span>주행</span></div>`;
    allRepairs.forEach(r => {
      const d = r.repairDate ? r.repairDate.slice(0, 10).replace(/-/g, '.') : '-';
      h += `<div class="gd-repair-row">
        <span class="gd-repair-date">${d}</span>
        <span class="gd-repair-item">${r.productName || '-'}</span>
        <span class="gd-repair-amt">${r.amount != null ? fmt(r.amount) + '원' : '-'}</span>
        <span class="gd-repair-km">${r.mileage != null ? fmt(r.mileage) + 'km' : '-'}</span>
      </div>`;
    });
    const moreBtn = allRepairs.length < total
      ? `<button class="gd-load-more show" id="${rowId}-rmore" onclick="gdRepairLoadMore('${rowId}','${encodeURIComponent(code)}')">더 보기 (${allRepairs.length}/${total})</button>`
      : '';
    detail.innerHTML = h + moreBtn;
    detail.dataset.page = String(page);
    detail.dataset.repairJson = JSON.stringify(allRepairs);
  } catch (e) {
    if (btn) btn.textContent = '로드 실패 — 다시 시도';
  }
}

// ===== GD 상품조회 (662 계정 전용) =====
let gdProductInit = false;
let gdProductState = { q: '', page: 1, total: 0, loading: false, items: [], debounceTimer: null };

function loadGdProduct() {
  if (gdProductInit) return;
  gdProductInit = true;
  const el = document.getElementById('gdProductContent');
  el.innerHTML = `
    <div style="max-width:520px;margin:0 auto">
      <div class="gd-search-spacer" style="height:30vh"></div>
      <div class="gd-search-wrap">
        <input class="gd-search-input" id="gdProductQ" type="search" placeholder="상품명, 코드, 타이어사이즈(2355519)"
          autocomplete="off" inputmode="search">
        <button class="gd-search-clear" id="gdProductClear" onclick="gdProductClear()">×</button>
      </div>
      <div class="gd-status show" id="gdProductStatus">검색어를 입력하세요</div>
      <div class="gd-list" id="gdProductList"></div>
      <button class="gd-load-more" id="gdProductMore" onclick="gdProductLoadMore()">더 보기</button>
    </div>`;

  const input = document.getElementById('gdProductQ');
  const pSpacer = el.querySelector('.gd-search-spacer');
  input.addEventListener('input', () => {
    const q = input.value.trim();
    if (pSpacer) pSpacer.style.height = q ? '0' : '30vh';
    document.getElementById('gdProductClear').classList.toggle('show', q.length > 0);

      gdProductReset();
      document.getElementById('gdProductStatus').textContent = '검색어를 입력하세요';

function gdProductReset() {
  gdProductState = { ...gdProductState, q: '', page: 1, total: 0, items: [] };
  document.getElementById('gdProductList').innerHTML = '';
  document.getElementById('gdProductMore').classList.remove('show');
}

function gdProductClear() {
  document.getElementById('gdProductQ').value = '';
  document.getElementById('gdProductClear').classList.remove('show');
  gdProductReset();
  document.getElementById('gdProductStatus').textContent = '검색어를 입력하세요';
  document.getElementById('gdProductStatus').classList.add('show');
  document.getElementById('gdProductQ').focus();
}

async function gdProductSearch(q, reset) {
  if (gdProductState.loading) return;
  gdProductState.loading = true;
  const statusEl = document.getElementById('gdProductStatus');
  const listEl = document.getElementById('gdProductList');
  const moreEl = document.getElementById('gdProductMore');

  if (reset) {
    gdProductState.q = q;
    gdProductState.page = 1;
    gdProductState.items = [];
    listEl.innerHTML = '';
    moreEl.classList.remove('show');
  }

  statusEl.textContent = '검색 중...';
  statusEl.classList.add('show');

  try {
    const page = gdProductState.page;
    const data = await api('/gd/products?q=' + encodeURIComponent(q) + '&page=' + page + '&limit=20');
    gdProductState.total = data.total || 0;
    const items = data.data || [];
    gdProductState.items = gdProductState.items.concat(items);

    if (gdProductState.items.length === 0) {
      statusEl.textContent = '검색 결과가 없습니다';
      statusEl.classList.add('show');
    } else {
      statusEl.classList.remove('show');
      items.forEach(p => listEl.insertAdjacentHTML('beforeend', gdProductCard(p)));
    }
    const loaded = gdProductState.items.length;
    moreEl.classList.toggle('show', loaded < gdProductState.total);
    if (loaded < gdProductState.total) moreEl.textContent = '더 보기 (' + loaded + '/' + gdProductState.total + ')';
    gdProductState.page++;
  } catch (e) {
    statusEl.textContent = '조회 실패: ' + e.message;
    statusEl.classList.add('show');
  }
  gdProductState.loading = false;
}

function gdProductLoadMore() {
  if (gdProductState.q) gdProductSearch(gdProductState.q, false);
}

function gdProductCard(p) {
  const id = 'gp-' + (p.code || '').replace(/[^a-zA-Z0-9가-힣]/g, '_');
  const price = p.sellPrice1 != null ? fmt(p.sellPrice1) + '원' : (p.fixedPrice != null ? fmt(p.fixedPrice) + '원' : '-');
  const name = p.name || p.altName || '-';
  const unit = p.unit || '';
  const stock = p.stock || 0;
  const hasStock = stock > 0;
  const noStockClass = hasStock ? '' : ' no-stock';
  const stockHtml = hasStock
    ? `<div class="gd-prod-stock has">재고 ${fmt(stock)}${unit || '개'}</div>`
    : `<div class="gd-prod-stock empty">재고 없음</div>`;

  const priceSteps = [1,2,3,4,5].map(i => {
    const v = p['sellPrice' + i];
    if (v == null) return '';
    return `<div class="gd-prod-detail-item"><div class="gd-prod-detail-label">판매가${i}</div><div class="gd-prod-detail-value">${fmt(v)}원</div></div>`;
  }).join('');
  const costHtml = p.costPrice != null
    ? `<div class="gd-prod-detail-item"><div class="gd-prod-detail-label">원가</div><div class="gd-prod-detail-value" style="color:var(--text-muted)">${fmt(p.costPrice)}원</div></div>` : '';
  const stockDetailHtml = `<div class="gd-prod-detail-item"><div class="gd-prod-detail-label">재고</div><div class="gd-prod-detail-value" style="color:${hasStock ? 'var(--green)' : 'var(--text-light)'}">${fmt(stock)}${unit || '개'}</div></div>`;
  const codeHtml = `<div class="gd-prod-detail-item"><div class="gd-prod-detail-label">상품코드</div><div class="gd-prod-detail-value" style="font-size:12px">${p.code || '-'}</div></div>`;
  const altHtml = p.altName && p.altName !== p.name
    ? `<div class="gd-prod-detail-item" style="grid-column:1/-1"><div class="gd-prod-detail-label">이름2</div><div class="gd-prod-detail-value" style="font-size:12px">${p.altName}</div></div>` : '';

  return `<div class="gd-row${noStockClass}" id="${id}" onclick="gdProductToggle('${id}')">
    <div class="gd-row-main product">
      <div>
        <div class="gd-prod-name">${name}</div>
        ${unit ? `<div class="gd-prod-unit">${unit}</div>` : ''}
      </div>
      <div>
        <div class="gd-prod-price">${price}</div>
        ${stockHtml}
      </div>
    </div>
    <div class="gd-detail" id="${id}-detail">
      <div class="gd-prod-detail-grid">
        ${codeHtml}${stockDetailHtml}${costHtml}${priceSteps}${altHtml}
      </div>
    </div>
  </div>`;
}

function gdProductToggle(rowId) {
  const row = document.getElementById(rowId);
  const detail = document.getElementById(rowId + '-detail');
  const isOpen = detail.classList.contains('show');
  document.querySelectorAll('#gdProductList .gd-detail.show').forEach(d => d.classList.remove('show'));
  document.querySelectorAll('#gdProductList .gd-row.open').forEach(r => r.classList.remove('open'));
  if (!isOpen) { row.classList.add('open'); detail.classList.add('show'); }
}

// ===== 시재관리 =====
let cashLedgerLoaded = false;

function loadCashLedger() {
  const el = document.getElementById('cashLedgerContent');
  el.innerHTML = renderCashLedgerShell();
  initCashLedgerDates();
  fetchCashLedger();
}

function renderCashLedgerShell() {
  return `
    <div style="max-width:520px;margin:0 auto">
      <!-- 날짜 선택 -->
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px">
            <label style="font-size:11px;font-weight:700;color:var(--text-muted)">시작일</label>
            <input type="date" id="clStartDate" style="padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#F5F5F5;color:var(--text);outline:none;" oninput="fetchCashLedger()">
          </div>
          <div style="font-size:16px;color:var(--text-light);padding-top:18px">~</div>
          <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px">
            <label style="font-size:11px;font-weight:700;color:var(--text-muted)">종료일</label>
            <input type="date" id="clEndDate" style="padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#F5F5F5;color:var(--text);outline:none;" oninput="fetchCashLedger()">
          </div>
        </div>
      </div>
      <!-- 요약 카드 -->
      <div id="clSummary"></div>
      <!-- 일별 내역 -->
      <div id="clDetail"></div>
    </div>`;
}

function initCashLedgerDates() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const start = `${y}-${m}-01`;
  const lastDay = new Date(y, now.getMonth() + 1, 0).getDate();
  const end = `${y}-${m}-${String(lastDay).padStart(2, '0')}`;
  const startEl = document.getElementById('clStartDate');
  const endEl = document.getElementById('clEndDate');
  if (startEl && !startEl.value) startEl.value = start;
  if (endEl && !endEl.value) endEl.value = end;
}

let clFetchTimer = null;
function fetchCashLedger() {
  clearTimeout(clFetchTimer);
  clFetchTimer = setTimeout(_fetchCashLedger, 300);
}

async function _fetchCashLedger() {
  const startEl = document.getElementById('clStartDate');
  const endEl = document.getElementById('clEndDate');
  const summaryEl = document.getElementById('clSummary');
  const detailEl = document.getElementById('clDetail');
  if (!startEl || !endEl || !summaryEl || !detailEl) return;

  const startDate = startEl.value;
  const endDate = endEl.value;
  if (!startDate || !endDate) return;

  // 오늘 날짜 (시재 = 금고 잔고는 항상 오늘까지 계산)
  const today = new Date().toISOString().slice(0, 10);

  const loadingHtml = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted)"><div class="spinner" style="width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px"></div>로딩 중...</div>';
  summaryEl.innerHTML = loadingHtml;
  detailEl.innerHTML = '';

  try {
    // 테이블용: 선택한 기간
    const tableData = await api(`/gd/cash-ledger?startDate=${startDate}&endDate=${endDate}`);
    // 시재용: 시작일~오늘 (금고 잔고는 항상 동일)
    let balanceData = tableData;
    if (endDate < today) {
      balanceData = await api(`/gd/cash-ledger?startDate=${startDate}&endDate=${today}`);
    }
    lastCashLedgerData = tableData;
    lastCashLedgerBalanceData = balanceData;
    renderCashLedgerSummary(balanceData, summaryEl);
    renderCashLedgerDetail(tableData, detailEl);
  } catch (e) {
    summaryEl.innerHTML = `<div style="text-align:center;padding:40px;color:var(--red)">데이터 로드 실패<br><span style="font-size:12px;color:var(--text-muted)">${e.message}</span></div>`;
    detailEl.innerHTML = '';
  }
}

// 마지막 API 응답 저장 (이월시재 변경 시 재렌더링용)
let lastCashLedgerData = null;
let lastCashLedgerBalanceData = null;

function renderCashLedgerSummary(data, el) {
  const { totalCashIn = 0, totalCashOut = 0 } = data;
  const carry = data.carryOver || 0;
  const finalBalance = carry + totalCashIn - totalCashOut;
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
      <div class="stat-card">
        <div class="label">입금 합계</div>
        <div class="value" style="font-size:20px;color:var(--accent)">₩${fmt(totalCashIn)}</div>
      </div>
      <div class="stat-card">
        <div class="label">출금 합계</div>
        <div class="value" style="font-size:20px;color:var(--red)">₩${fmt(totalCashOut)}</div>
      </div>
      <div class="stat-card" style="background:linear-gradient(135deg,#E8F5E9,#C8E6C9)">
        <div class="label" style="color:#2E7D32">시재</div>
        <div class="value" style="font-size:22px;color:#1B5E20;font-weight:800">₩${fmt(finalBalance)}</div>
      </div>
    </div>`;
}

function renderCashLedgerDetail(data, el) {
  const { dailyEntries = [], totalCashIn = 0, totalCashOut = 0 } = data;
  const carry = data.carryOver || 0;

  if (!dailyEntries.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">해당 기간 내역이 없습니다.</div>';
    return;
  }

  // 시재 누계 계산 (이월시재부터 시작)
  let running = carry;
  let allEntries = [];
  dailyEntries.forEach(day => {
    (day.entries || []).forEach(entry => {
      if (entry.type === 'in') running += entry.amount;
      else running -= entry.amount;
      allEntries.push({ ...entry, date: day.date, balance: running });
    });
  });

  // 이월시재 행 + 내역 행
  let rows = `<tr style="background:#FFFDE7">
    <td style="color:var(--text-muted);white-space:nowrap"></td>
    <td colspan="2" style="font-weight:700;color:#F57F17">이월시재</td>
    <td></td><td></td>
    <td style="text-align:right;white-space:nowrap;font-weight:700;color:#F57F17">${fmt(carry)}</td>
  </tr>`;

  allEntries.forEach(e => {
    const dateLabel = formatDateShort(e.date);
    const isIn = e.type === 'in';
    const inAmt = isIn ? `<span style="color:var(--accent);font-weight:700">${fmt(e.amount)}</span>` : '';
    const outAmt = !isIn ? `<span style="color:var(--red);font-weight:700">${fmt(e.amount)}</span>` : '';
    rows += `<tr>
      <td style="color:var(--text-muted);white-space:nowrap">${dateLabel}</td>
      <td style="color:var(--text-muted);font-size:12px;white-space:nowrap">${e.source || ''}</td>
      <td style="max-width:160px;word-break:keep-all">${e.description || ''}</td>
      <td style="text-align:right;white-space:nowrap">${inAmt}</td>
      <td style="text-align:right;white-space:nowrap">${outAmt}</td>
      <td style="text-align:right;white-space:nowrap;font-weight:600">${fmt(e.balance)}</td>
    </tr>`;
  });

  const finalBalance = carry + totalCashIn - totalCashOut;

  el.innerHTML = `
    <div class="card" style="padding:0;overflow:hidden">
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead>
            <tr style="background:#F5F5F5;border-bottom:1px solid var(--border)">
              <th style="padding:10px 12px;text-align:left;font-weight:700;color:var(--text-muted);white-space:nowrap">날짜</th>
              <th style="padding:10px 8px;text-align:left;font-weight:700;color:var(--text-muted);white-space:nowrap">구분</th>
              <th style="padding:10px 8px;text-align:left;font-weight:700;color:var(--text-muted)">적요</th>
              <th style="padding:10px 8px;text-align:right;font-weight:700;color:var(--accent);white-space:nowrap">입금</th>
              <th style="padding:10px 8px;text-align:right;font-weight:700;color:var(--red);white-space:nowrap">출금</th>
              <th style="padding:10px 12px;text-align:right;font-weight:700;color:#1B5E20;white-space:nowrap">시재</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
          <tfoot>
            <tr style="background:#E8F5E9;border-top:2px solid #4CAF50">
              <td colspan="3" style="padding:10px 12px;font-weight:800;font-size:14px;color:#1B5E20">합계</td>
              <td style="padding:10px 8px;text-align:right;font-weight:800;color:var(--accent);white-space:nowrap">${fmt(totalCashIn)}</td>
              <td style="padding:10px 8px;text-align:right;font-weight:800;color:var(--red);white-space:nowrap">${fmt(totalCashOut)}</td>
              <td style="padding:10px 12px;text-align:right;font-weight:800;color:#1B5E20;font-size:15px;white-space:nowrap">${fmt(finalBalance)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>`;
}

function formatDateShort(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

if (token) { initApp(); }
</script>
