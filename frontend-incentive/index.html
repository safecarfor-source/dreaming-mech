<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인센티브 현황판 - 꿈꾸는 정비사</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

:root {
  --bg: #f5f5f0;
  --card: #ffffff;
  --text: #2c2c2a;
  --text-muted: #888780;
  --text-light: #b4b2a9;
  --border: #e8e6df;
  --purple: #7C3AED;
  --purple-light: #EEEDFE;
  --teal: #1D9E75;
  --teal-light: #E1F5EE;
  --coral: #D85A30;
  --coral-light: #FAECE7;
  --blue: #378ADD;
  --blue-light: #E6F1FB;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --red: #E24B4A;
  --red-light: #FCEBEB;
  --green: #639922;
  --green-light: #EAF3DE;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* --- Login --- */
.login-page {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 24px;
}
.login-box {
  background: var(--card);
  border-radius: 16px;
  padding: 48px 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow);
  text-align: center;
}
.login-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.login-box .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
.login-box input {
  width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 10px;
  font-size: 15px; font-family: inherit; margin-bottom: 12px; outline: none; transition: border-color 0.2s;
}
.login-box input:focus { border-color: var(--purple); }
.login-box button {
  width: 100%; padding: 14px; background: var(--purple); color: #fff; border: none; border-radius: 10px;
  font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 8px; transition: opacity 0.2s;
}
.login-box button:hover { opacity: 0.9; }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 20px; }

/* --- App Shell --- */
.app { display: none; }
.app.active { display: block; }
.top-bar {
  display: flex; justify-content: space-between; align-items: center; padding: 16px 24px;
  background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
}
.top-bar .logo { font-size: 18px; font-weight: 700; color: var(--purple); }
.top-bar .user-info { display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--text-muted); }
.top-bar .user-info .name { font-weight: 600; color: var(--text); }
.top-bar .user-info .role-badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.role-admin { background: var(--purple-light); color: var(--purple); }
.role-manager { background: var(--blue-light); color: var(--blue); }
.role-director { background: var(--teal-light); color: var(--teal); }
.role-viewer { background: #f0f0ec; color: var(--text-muted); }
.btn-logout {
  padding: 6px 14px; background: none; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; font-family: inherit; cursor: pointer; color: var(--text-muted);
}
.btn-logout:hover { background: var(--red-light); color: var(--red); border-color: var(--red); }

/* --- Tabs --- */
.tab-bar { display: flex; gap: 0; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; }
.tab-btn {
  padding: 14px 24px; font-size: 14px; font-weight: 500; font-family: inherit; color: var(--text-muted);
  background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); font-weight: 700; }

/* --- Content --- */
.content { padding: 24px; max-width: 1200px; margin: 0 auto; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* --- Cards --- */
.card { background: var(--card); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }

/* --- Stat Grid --- */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
.stat-card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); text-align: center; }
.stat-card .label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.text-purple { color: var(--purple); }
.text-teal { color: var(--teal); }
.text-red { color: var(--red); }
.text-blue { color: var(--blue); }
.text-amber { color: var(--amber); }
.text-green { color: var(--green); }

/* --- Loss/OK Banner --- */
.loss-banner { background: var(--red-light); border: 2px solid var(--red); border-radius: 12px; padding: 20px 24px; text-align: center; margin-bottom: 20px; }
.loss-banner .loss-label { font-size: 13px; font-weight: 600; color: var(--red); margin-bottom: 6px; }
.loss-banner .loss-amount { font-size: 32px; font-weight: 700; color: var(--red); }
.ok-banner { background: var(--green-light); border: 2px solid var(--green); border-radius: 12px; padding: 20px 24px; text-align: center; margin-bottom: 20px; }
.ok-banner .ok-label { font-size: 13px; font-weight: 600; color: var(--green); }
.ok-banner .ok-amount { font-size: 32px; font-weight: 700; color: var(--green); }

/* --- Table --- */
.data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.data-table th { text-align: left; padding: 10px 12px; font-weight: 600; font-size: 12px; color: var(--text-muted); border-bottom: 2px solid var(--border); text-transform: uppercase; }
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.data-table tr:last-child td { border-bottom: none; }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.data-table .met { color: var(--green); font-weight: 600; }
.data-table .unmet { color: var(--red); font-weight: 600; }

/* --- Progress bar --- */
.progress-wrap { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-top: 6px; }
.progress-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

/* --- Chart (Stock Style) --- */
.chart-wrap { position: relative; height: 320px; margin-top: 8px; }
.chart-wrap canvas { width: 100% !important; }

/* --- Month Selector --- */
.month-sel { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.month-sel select { padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; background: var(--card); cursor: pointer; }

/* --- Admin --- */
.admin-section { margin-bottom: 32px; }
.admin-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--purple); }
.config-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.config-row:last-child { border-bottom: none; }
.config-row .config-label { font-size: 14px; flex: 1; }
.config-row input { width: 120px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; text-align: right; font-family: inherit; }
.btn-save { padding: 6px 16px; background: var(--purple); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer; margin-left: 8px; }
.btn-save:hover { opacity: 0.9; }

/* --- Upload --- */
.upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
.upload-area:hover { border-color: var(--purple); }
.upload-area input { display: none; }
.upload-area .upload-icon { font-size: 40px; color: var(--text-light); margin-bottom: 12px; }
.upload-area .upload-text { font-size: 14px; color: var(--text-muted); }
.upload-compact { border: 2px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 20px; transition: border-color 0.2s; }
.upload-compact:hover { border-color: var(--blue); }
.upload-compact input { display: none; }

/* --- Responsive --- */
@media (max-width: 768px) {
  .content { padding: 16px; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-card .value { font-size: 22px; }
  .loss-banner .loss-amount, .ok-banner .ok-amount { font-size: 24px; }
  .top-bar { padding: 12px 16px; }
  .tab-btn { padding: 12px 16px; font-size: 13px; }
}
@media (max-width: 480px) {
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .stat-card { padding: 14px; }
  .stat-card .value { font-size: 20px; }
}

/* --- Loading --- */
.loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <h1>인센티브 현황판</h1>
    <p class="subtitle">꿈꾸는 정비사</p>
    <input type="text" id="loginId" placeholder="아이디" autocomplete="username">
    <input type="password" id="loginPw" placeholder="비밀번호" autocomplete="current-password">
    <button onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="app">
  <div class="top-bar">
    <span class="logo">인센티브 현황판</span>
    <div class="user-info">
      <span class="name" id="userName"></span>
      <span class="role-badge" id="userRole"></span>
      <button class="btn-logout" onclick="showChangePw()" style="border-color:var(--blue);color:var(--blue)">비밀번호 변경</button>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- Password Change Modal -->
  <div id="pwModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:999;justify-content:center;align-items:center">
    <div style="background:var(--card);border-radius:16px;padding:32px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.15)">
      <h3 style="margin-bottom:20px;font-size:18px">비밀번호 변경</h3>
      <input type="password" id="pwCurrent" placeholder="현재 비밀번호" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:10px">
      <input type="password" id="pwNew" placeholder="새 비밀번호" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:10px">
      <input type="password" id="pwConfirm" placeholder="새 비밀번호 확인" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:16px">
      <div id="pwError" style="color:var(--red);font-size:13px;min-height:20px;margin-bottom:8px"></div>
      <div style="display:flex;gap:10px">
        <button onclick="closePwModal()" style="flex:1;padding:12px;background:none;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;cursor:pointer">취소</button>
        <button onclick="doChangePw()" style="flex:1;padding:12px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer">변경</button>
      </div>
    </div>
  </div>

  <div class="tab-bar" id="tabBar"></div>

  <div class="content">
    <div class="tab-content" id="tab-team">
      <div class="month-sel">
        <label>조회 월:</label>
        <select id="teamMonthSel" onchange="loadTeamData()"></select>
      </div>
      <div id="teamContent"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
    </div>
    <div class="tab-content" id="tab-manager">
      <div class="month-sel">
        <label>조회 월:</label>
        <select id="managerMonthSel" onchange="loadManagerData()"></select>
      </div>
      <div id="managerContent"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
    </div>
    <div class="tab-content" id="tab-director">
      <div class="month-sel">
        <label>조회 월:</label>
        <select id="directorMonthSel" onchange="loadDirectorData()"></select>
      </div>
      <div id="directorContent"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
    </div>
    <div class="tab-content" id="tab-admin">
      <div id="adminContent"></div>
    </div>
  </div>
</div>

<script>
const API = '/api/incentive';
let token = localStorage.getItem('inc_token');
let currentUser = null;
let chartInstances = {};

function fmt(n) { if (n == null) return '-'; return Math.round(n).toLocaleString('ko-KR'); }
function fmtWon(n) { if (n == null) return '-'; return fmt(n) + '원'; }
function fmtMan(n) { if (n == null) return '-'; return (n / 10000).toFixed(0) + '만'; }

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...opts.headers },
  });
  if (res.status === 401) { doLogout(); throw new Error('인증 만료'); }
  if (!res.ok) throw new Error('API 오류: ' + res.status);
  return res.json();
}

// ===== Stock Chart Helper =====
function createStockChart(canvasId, labels, dataArr, options = {}) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  const ctx2d = canvas.getContext('2d');

  const mainColor = options.color || '#7C3AED';
  const negColor = options.negColor || '#E24B4A';
  const hasNeg = options.negCheck;
  const refLine = options.refLine;
  const yFormat = options.yFormat || (v => fmt(v));
  const tipFormat = options.tipFormat || (v => fmtWon(v));

  // Gradient fill
  const grad = ctx2d.createLinearGradient(0, 0, 0, 320);
  grad.addColorStop(0, mainColor + '40');
  grad.addColorStop(0.7, mainColor + '08');
  grad.addColorStop(1, mainColor + '00');

  // Point colors (green/red per segment)
  const pointColors = hasNeg
    ? dataArr.map((v, i) => hasNeg(i) ? negColor : mainColor)
    : dataArr.map(() => mainColor);

  // Segment coloring
  const segmentBorder = hasNeg ? {
    borderColor: (ctx) => {
      const i = ctx.p0DataIndex;
      return hasNeg(i) || hasNeg(i + 1) ? negColor : mainColor;
    }
  } : {};

  const datasets = [{
    label: options.label || '',
    data: dataArr,
    borderColor: hasNeg ? pointColors : mainColor,
    backgroundColor: grad,
    fill: true,
    tension: 0,
    borderWidth: 3,
    pointRadius: 6,
    pointHoverRadius: 9,
    pointBackgroundColor: pointColors,
    pointBorderColor: '#fff',
    pointBorderWidth: 2,
    pointHitRadius: 20,
    segment: segmentBorder,
  }];

  // Reference line plugin
  const refPlugin = refLine ? {
    id: 'refLine',
    beforeDraw(chart) {
      const yAxis = chart.scales.y;
      const y = yAxis.getPixelForValue(refLine.value);
      const { ctx, chartArea } = chart;
      if (y < chartArea.top || y > chartArea.bottom) return;
      ctx.save();
      ctx.beginPath();
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = refLine.color || '#E24B4A';
      ctx.lineWidth = 2;
      ctx.moveTo(chartArea.left, y);
      ctx.lineTo(chartArea.right, y);
      ctx.stroke();
      // Label
      ctx.font = '11px "Noto Sans KR"';
      ctx.fillStyle = refLine.color || '#E24B4A';
      ctx.textAlign = 'right';
      ctx.fillText(refLine.label || '', chartArea.right - 4, y - 6);
      ctx.restore();
    }
  } : null;

  // Crosshair plugin
  const crosshairPlugin = {
    id: 'crosshair',
    afterDraw(chart) {
      if (chart.tooltip && chart.tooltip.opacity > 0 && chart.tooltip.caretX) {
        const { ctx, chartArea } = chart;
        const x = chart.tooltip.caretX;
        ctx.save();
        ctx.beginPath();
        ctx.setLineDash([3, 3]);
        ctx.strokeStyle = '#b4b2a9';
        ctx.lineWidth = 1;
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.stroke();
        ctx.restore();
      }
    }
  };

  const plugins = [crosshairPlugin];
  if (refPlugin) plugins.push(refPlugin);

  return new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    plugins,
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(44,44,42,0.92)',
          titleFont: { size: 13, weight: '600' },
          bodyFont: { size: 14 },
          padding: 14,
          cornerRadius: 10,
          displayColors: false,
          callbacks: {
            title: (items) => items[0].label,
            label: (ctx) => tipFormat(ctx.raw),
          },
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 12 }, color: '#888780' },
        },
        y: {
          grid: { color: '#f0efe8', drawBorder: false },
          border: { display: false },
          ticks: { font: { size: 11 }, color: '#b4b2a9', callback: yFormat },
        },
      },
      animation: { duration: 800, easing: 'easeOutQuart' },
    },
  });
}

// ===== Auth =====
async function doLogin() {
  const loginId = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!loginId || !pw) { errEl.textContent = '아이디와 비밀번호를 입력하세요'; return; }
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ loginId, password: pw }),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); errEl.textContent = d.message || '로그인 실패'; return; }
    const data = await res.json();
    token = data.token;
    localStorage.setItem('inc_token', token);
    await initApp();
  } catch (e) { errEl.textContent = '서버 연결 실패'; }
}

function doLogout() {
  token = null; currentUser = null;
  localStorage.removeItem('inc_token');
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
}

async function initApp() {
  try { currentUser = await api('/auth/me'); } catch { doLogout(); return; }
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('userName').textContent = currentUser.name;
  const roleMap = { admin: '관리자', manager: '매니저', director: '부장', viewer: '공용' };
  const roleEl = document.getElementById('userRole');
  roleEl.textContent = roleMap[currentUser.role] || currentUser.role;
  roleEl.className = 'role-badge role-' + currentUser.role;
  buildTabs();
}

function buildTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  const tabs = [{ id: 'team', label: '팀 인센티브' }];
  if (currentUser.access.includes('manager')) tabs.push({ id: 'manager', label: '김권중' });
  if (currentUser.access.includes('director')) tabs.push({ id: 'director', label: '이정석' });
  if (currentUser.access.includes('admin')) tabs.push({ id: 'admin', label: '관리자' });
  tabs.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => switchTab(t.id, btn);
    bar.appendChild(btn);
  });
  switchTab(tabs[0].id, bar.querySelector('.tab-btn'));
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
  if (btn) btn.classList.add('active');
  if (tabId === 'team') loadTeamInit();
  else if (tabId === 'manager') loadManagerInit();
  else if (tabId === 'director') loadDirectorInit();
  else if (tabId === 'admin') loadAdminPanel();
}

// ===== TEAM =====
let teamMonthlyData = null;
async function loadTeamInit() {
  if (teamMonthlyData) return;
  try {
    teamMonthlyData = await api('/team/monthly');
    const sel = document.getElementById('teamMonthSel');
    sel.innerHTML = '';
    teamMonthlyData.forEach((m, i) => {
      const opt = document.createElement('option');
      opt.value = m.month; opt.textContent = m.month;
      if (i === teamMonthlyData.length - 1) opt.selected = true;
      sel.appendChild(opt);
    });
    loadTeamData();
  } catch (e) { document.getElementById('teamContent').innerHTML = '<p style="color:var(--red)">데이터 로드 실패</p>'; }
}

async function loadTeamData() {

const ITEM_LABELS = {
  brake_oil:'브레이크오일', lining:'라이닝', mission_oil:'미션오일', diff_oil:'데후오일',
  wiper:'와이퍼', battery:'밧데리', ac_filter:'에어컨필터',
  guardian_h3:'가디안H3', guardian_h5:'가디안H5', guardian_h7:'가디안H7',
};
const ITEM_RATES = {
  brake_oil:2.8, lining:1.4, mission_oil:2.8, diff_oil:1.0,
  wiper:0.3, battery:0.5, ac_filter:1.0, guardian_h3:2.0, guardian_h5:2.0, guardian_h7:2.0,
};

function renderTeam(data, el) {
  const inc = data.incentive;
  const isLoss = inc.lost > 0;
  let html = '';

  // Loss banner
  if (isLoss) {
    html += `<div class="loss-banner"><div class="loss-label">최소수량 미달로 잃은 금액</div><div class="loss-amount">-${fmtWon(inc.lost)}</div></div>`;
  }

  // Stat cards
  html += `<div class="stat-grid">
    <div class="stat-card"><div class="label">이번 달 인센티브</div><div class="value ${isLoss?'text-amber':'text-purple'}">${fmtWon(inc.actual)}</div>${isLoss?`<div class="sub">감액 전: ${fmtWon(inc.calculated)}</div>`:''}</div>
    <div class="stat-card"><div class="label">감액률</div><div class="value ${isLoss?'text-red':'text-green'}">${isLoss?'50%':'0%'}</div><div class="sub">${isLoss?'최소수량 미달':'정상 지급'}</div></div>`;
  if (data.prevMonth) {
    const diff = inc.actual - (data.prevMonth.incentive || 0);
    html += `<div class="stat-card"><div class="label">전월 대비</div><div class="value ${diff>=0?'text-teal':'text-red'}">${diff>=0?'+':''}${fmtWon(diff)}</div><div class="sub">${data.prevMonth.month}: ${fmtWon(data.prevMonth.incentive)}</div></div>`;
  }
  html += '</div>';

  // CHART (2nd section - right after stats)
  html += `<div class="card"><div class="card-title">월별 인센티브 추이</div><div class="chart-wrap"><canvas id="teamChart"></canvas></div></div>`;

  // Upload area for viewer (shared account)
  if (currentUser.role === 'viewer') {
    html += `<div class="upload-compact" onclick="document.getElementById('viewerExcelFile').click()">
      <span style="font-size:14px;color:var(--purple);font-weight:600">📄 극동 엑셀 업로드</span>
      <span style="font-size:12px;color:var(--text-muted);margin-left:8px">(.xlsx 파일 선택)</span>
      <input type="file" id="viewerExcelFile" accept=".xlsx,.xls" onchange="uploadExcel(this)">
    </div>
    <div id="viewerUploadResult"></div>`;
  }

  // Min qty check
  if (data.minQtyCheck && data.minQtyCheck.items.length > 0) {
    html += `<div class="card"><div class="card-title">최소수량 달성 현황 (${data.minQtyCheck.metCount}/${data.minQtyCheck.totalCount})</div>
      <table class="data-table"><thead><tr><th>항목</th><th class="num">현재</th><th class="num">목표</th><th class="num">달성</th><th class="num">잔여</th></tr></thead><tbody>`;
    data.minQtyCheck.items.forEach(item => {
      const p = item.target>0?Math.min(100,Math.round(item.current/item.target*100)):100;
      html += `<tr><td>${ITEM_LABELS[item.itemKey]||item.itemKey}</td><td class="num">${item.current}</td><td class="num">${item.target}</td>
        <td class="num ${item.met?'met':'unmet'}">${item.met?'달성':'미달'}</td><td class="num ${item.met?'':'unmet'}">${item.met?'-':item.remaining}</td></tr>
        <tr><td colspan="5" style="padding:2px 12px 8px"><div class="progress-wrap"><div class="progress-bar" style="width:${p}%;background:${item.met?'var(--green)':'var(--red)'}"></div></div></td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  // Detail table
  html += `<div class="card"><div class="card-title">품목별 매출 & 인센티브</div>
    <table class="data-table"><thead><tr><th>품목</th><th class="num">매출</th><th class="num">수량</th><th class="num">배율</th><th class="num">인센티브</th></tr></thead><tbody>`;
  let totalSales=0, totalInc=0;
  for (const [key,val] of Object.entries(data.items)) {
    const rate=ITEM_RATES[key]||0; const itemInc=Math.round(val.sales*rate/100); totalSales+=val.sales; totalInc+=itemInc;
    html += `<tr><td>${ITEM_LABELS[key]||key}</td><td class="num">${fmtWon(val.sales)}</td><td class="num">${val.qty}</td><td class="num">${rate}%</td><td class="num text-purple">${fmtWon(itemInc)}</td></tr>`;
  }
  html += `<tr style="font-weight:700;border-top:2px solid var(--border)"><td>합계</td><td class="num">${fmtWon(totalSales)}</td><td></td><td></td><td class="num text-purple">${fmtWon(totalInc)}</td></tr></tbody></table></div>`;

  el.innerHTML = html;

  // Render stock chart
  if (teamMonthlyData && teamMonthlyData.length > 0) {
    if (chartInstances.team) chartInstances.team.destroy();
    chartInstances.team = createStockChart('teamChart',
      teamMonthlyData.map(m => m.month),
      teamMonthlyData.map(m => m.incentive),
      {
        color: '#7C3AED',
        negColor: '#E24B4A',
        negCheck: (i) => teamMonthlyData[i] && teamMonthlyData[i].penalized,
        yFormat: v => fmtMan(v),
        tipFormat: v => fmtWon(v),
        label: '인센티브',
      }
    );
  }
}

      <span style="font-size:12px;color:var(--text-muted);margin-left:8px">(.xlsx 파일 선택)</span>

    </div>
    <div id="dirUploadResult"></div>`;

  html += `<div class="card"><div class="card-title">추가 인센티브 항목</div>
    <table class="data-table"><thead><tr><th>항목</th><th class="num">매출</th><th class="num">인센티브</th></tr></thead><tbody>
    <tr><td>와이퍼 (0.3%)</td><td class="num">${fmtWon(data.extras.wiper.sales)}</td><td class="num text-teal">${fmtWon(data.extras.wiper.incentive)}</td></tr>
    <tr><td>밧데리 (0.5%)</td><td class="num">${fmtWon(data.extras.battery.sales)}</td><td class="num text-teal">${fmtWon(data.extras.battery.incentive)}</td></tr>

async function saveConfig(key) {
  const input = document.getElementById('cfg-' + key);
  const value = parseFloat(input.value);
  if (isNaN(value)) { alert('올바른 숫자를 입력하세요'); return; }
  try {
    await api('/config/' + key, { method: 'PUT', body: JSON.stringify({ value }) });
    alert('저장 완료');
    teamMonthlyData = null; managerMonthlyData = null; directorMonthlyData = null;
  } catch (e) { alert('저장 실패: ' + e.message); }
}

async function uploadExcel(input) {
  const file = input.files[0];
  if (!file) return;

  // Find closest result container
  let resultEl = input.closest('.upload-area, .upload-compact')?.nextElementSibling;
  if (!resultEl) resultEl = document.getElementById('uploadResult');
  if (resultEl) resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>업로드 중...</div>';

  const formData = new FormData();
  formData.append('file', file);
  try {
    const res = await fetch(API + '/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || '업로드 실패');
    if (resultEl) resultEl.innerHTML = `<div class="card" style="background:var(--green-light)">
      <p style="color:var(--green);font-weight:600">업로드 성공</p>
      <p style="font-size:13px;margin-top:8px">상태: ${data.status||'pending'}</p>
      ${data.status==='pending'&&currentUser.role==='admin'?`<button class="btn-save" style="margin-top:12px" onclick="approveUpload('${data.id}')">승인</button>`:''}
    </div>`;
    teamMonthlyData = null; managerMonthlyData = null; directorMonthlyData = null;
  } catch (e) {
    if (resultEl) resultEl.innerHTML = `<div class="card" style="background:var(--red-light)"><p style="color:var(--red);font-weight:600">업로드 실패</p><p style="font-size:13px;margin-top:8px">${e.message}</p></div>`;
  }
  input.value = '';
}

async function approveUpload(id) {
  try {
    await api('/upload/approve/' + id, { method: 'POST' });
    alert('승인 완료');
    teamMonthlyData = null; managerMonthlyData = null; directorMonthlyData = null;
    loadUploadHistory();
  } catch (e) { alert('승인 실패: ' + e.message); }
}

async function loadUploadHistory() {
  const el = document.getElementById('uploadHistory');
  if (!el) return;
  try {
    const history = await api('/upload/history');
    if (!history || history.length === 0) { el.innerHTML = '<p style="color:var(--text-muted);font-size:13px">업로드 이력 없음</p>'; return; }
    let html = '<table class="data-table"><thead><tr><th>날짜</th><th>파일</th><th>월</th><th>상태</th><th>작업</th></tr></thead><tbody>';
    history.forEach(h => {
      const date = new Date(h.uploadedAt).toLocaleString('ko-KR');
      html += `<tr><td style="font-size:12px">${date}</td><td style="font-size:12px">${h.fileName||'-'}</td><td>${h.month||'-'}</td>
        <td><span style="color:${h.status==='approved'?'var(--green)':'var(--amber)'}">${h.status==='approved'?'승인됨':'대기중'}</span></td>
        <td>${h.status==='pending'?`<button class="btn-save" onclick="approveUpload('${h.id}')">승인</button>`:'-'}</td></tr>`;
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  } catch { el.innerHTML = '<p style="color:var(--text-muted);font-size:13px">이력 로드 실패</p>'; }
}

// ===== Admin Reset Password =====
async function adminResetPw(userId, name) {
  const newPw = prompt(name + '의 새 비밀번호를 입력하세요:');
  if (!newPw) return;
  try {
    await api('/users/' + userId, { method: 'PUT', body: JSON.stringify({ password: newPw }) });
    alert(name + '의 비밀번호가 변경되었습니다.');
    loadAdminPanel();
  } catch (e) { alert('변경 실패: ' + e.message); }
}

// ===== Password Change =====
function showChangePw() {
  document.getElementById('pwModal').style.display = 'flex';
  document.getElementById('pwCurrent').value = '';
  document.getElementById('pwNew').value = '';
  document.getElementById('pwConfirm').value = '';
  document.getElementById('pwError').textContent = '';
}
function closePwModal() { document.getElementById('pwModal').style.display = 'none'; }
async function doChangePw() {
  const cur = document.getElementById('pwCurrent').value;
  const nw = document.getElementById('pwNew').value;
  const cf = document.getElementById('pwConfirm').value;
  const err = document.getElementById('pwError');
  if (!cur || !nw || !cf) { err.textContent = '모든 항목을 입력하세요'; return; }
  if (nw !== cf) { err.textContent = '새 비밀번호가 일치하지 않습니다'; return; }
  if (nw.length < 4) { err.textContent = '비밀번호는 4자 이상이어야 합니다'; return; }
  try {
    await api('/auth/change-password', { method: 'PUT', body: JSON.stringify({ currentPassword: cur, newPassword: nw }) });
    alert('비밀번호가 변경되었습니다. 다시 로그인해주세요.');
    closePwModal(); doLogout();
  } catch (e) { err.textContent = e.message.includes('401') ? '현재 비밀번호가 올바르지 않습니다' : '변경 실패'; }
}

// ===== Enter key login =====
document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginId').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPw').focus(); });

// ===== Auto-login =====
if (token) { initApp(); }
