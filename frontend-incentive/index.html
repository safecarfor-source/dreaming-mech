  function calcStage(growthPct) {
    const targetTotal = Math.round(lyTotal * (1 + growthPct / 100));
    const remainingSales = targetTotal - tysSales;
    const requiredDaily = tyRemain > 0 ? remainingSales / tyRemain : 0;
    const progress = Math.min(tysSales / targetTotal * 100, 100);
    const achieved = tysSales >= targetTotal;
    return { targetTotal, remainingSales, requiredDaily, progress, achieved };
  }

  function feasibility(requiredDaily, tyAvgVal) {
    if (requiredDaily <= 0) return { emoji: '🟢', text: '이미 달성!', color: '#1D9E75' };
    const ratio = requiredDaily / tyAvgVal;
    if (ratio <= 1.0) return { emoji: '🟢', text: '초과 달성 중', color: '#1D9E75' };
    if (ratio <= 1.1) return { emoji: '🟢', text: '페이스 유지', color: '#1D9E75' };
    if (ratio <= 1.3) return { emoji: '🟡', text: '약간 노력 필요', color: '#D97706' };
    if (ratio <= 1.5) return { emoji: '🟠', text: '상당한 노력 필요', color: '#E67E22' };
    return { emoji: '🔴', text: '매우 도전적', color: '#E24B4A' };
  }

  // ===== 매출 요약 카드 =====
  html += `<div style="background:#fff;border-radius:14px;border:1px solid #E8E6DF;padding:18px 16px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="flex:1;text-align:center">
        <div style="font-size:11px;color:#888780;margin-bottom:2px">작년 ${month}월 매출</div>
        <div style="font-size:16px;font-weight:800;color:#2C2C2A">${fmtMan(lyTotal)}</div>
      </div>
      <div style="font-size:18px;color:#B4B2A9">→</div>
      <div style="flex:1;text-align:center">
        <div style="font-size:11px;color:#888780;margin-bottom:2px">올해 ${month}월 누적</div>
        <div style="font-size:16px;font-weight:800;color:#7C3AED">${fmtMan(tysSales)}</div>
      </div>
    </div>
    <div style="text-align:center;font-size:12px;color:#888780">
      영업일: <strong style="color:#2C2C2A">${tyElapsed}일</strong> 경과 / <strong style="color:#7C3AED">${tyRemain}일</strong> 남음 (총 ${totalBizDays}일)
    </div>
  </div>`;

  // ===== 현재 현황 카드 =====
  const growthIcon = projGrowth >= 0 ? '📈' : '📉';
  const growthColor = projGrowth >= 0 ? '#1D9E75' : '#E24B4A';
  html += `<div style="background:#fff;border-radius:14px;border:1px solid #E8E6DF;padding:18px 16px;margin-bottom:16px">
    <div style="font-size:15px;font-weight:800;color:#2C2C2A;margin-bottom:14px;text-align:center">📊 일평균 & 예상</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="text-align:center;padding:12px;background:#F9FAFB;border-radius:10px">
        <div style="font-size:11px;color:#888780;margin-bottom:4px">작년 일평균</div>
        <div style="font-size:17px;font-weight:800;color:#2C2C2A">${fmtMan(lyAvg)}</div>
      </div>
      <div style="text-align:center;padding:12px;background:#F3F0FF;border-radius:10px">
        <div style="font-size:11px;color:#888780;margin-bottom:4px">올해 일평균</div>
        <div style="font-size:17px;font-weight:800;color:#7C3AED">${fmtMan(tyAvg)}</div>
      </div>
      <div style="text-align:center;padding:12px;background:#F9FAFB;border-radius:10px">
        <div style="font-size:11px;color:#888780;margin-bottom:4px">예상 총매출</div>
        <div style="font-size:17px;font-weight:800;color:#2C2C2A">${fmtMan(projected)}</div>
      </div>
      <div style="text-align:center;padding:12px;background:${projGrowth >= 0 ? '#E1F5EE' : '#FCEBEB'};border-radius:10px">
        <div style="font-size:11px;color:#888780;margin-bottom:4px">예상 성장률</div>
        <div style="font-size:17px;font-weight:800;color:${growthColor}">${growthIcon} ${projGrowth >= 0 ? '+' : ''}${projGrowth.toFixed(1)}%</div>
      </div>
    </div>
  </div>`;

  // ===== 4 Stage 프로그레스바 =====
  let highestAchievable = -1;
  stages.forEach((stage, idx) => {
    const s = calcStage(stage.growthPct);
    const f = feasibility(s.requiredDaily, tyAvg);

    // 달성 가능 최고 단계 추적
    if (s.achieved || f.color === '#1D9E75') highestAchievable = idx;

    const barWidth = Math.max(s.progress, 2);
    const barColor = s.achieved ? '#1D9E75' : stage.color;

    html += `<div style="background:#fff;border-radius:14px;border:1.5px solid ${s.achieved ? '#1D9E75' : stage.color};padding:16px;margin-bottom:12px;${s.achieved ? 'opacity:1' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="background:${stage.color};color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px">Stage ${idx + 1}</span>
          <span style="font-size:13px;font-weight:700;color:#2C2C2A">${stage.label}</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <span style="font-size:14px">${f.emoji}</span>
          <span style="font-size:12px;font-weight:600;color:${f.color}">${f.text}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="font-size:13px;font-weight:700;color:${barColor};white-space:nowrap">${s.progress.toFixed(1)}%</div>
        <div style="flex:1;background:#F0F0F0;border-radius:6px;height:12px;overflow:hidden">
          <div style="width:${barWidth}%;height:100%;background:${barColor};border-radius:6px;transition:width 0.5s ease"></div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#888780">
        <div>목표: <span style="font-weight:700;color:#2C2C2A">${fmtBigWon(s.targetTotal)}</span></div>
        ${s.achieved
          ? '<div style="font-weight:700;color:#1D9E75">✅ 달성 완료!</div>'
          : `<div>남은 매출: <span style="font-weight:700;color:${stage.color}">${fmtBigWon(Math.max(s.remainingSales, 0))}</span></div>`
        }
      </div>
      ${!s.achieved && tyRemain > 0 ? `<div style="text-align:right;font-size:12px;color:#888780;margin-top:4px">일 필요 매출: <span style="font-weight:700;color:${stage.color}">${fmtMan(Math.round(Math.max(s.requiredDaily, 0)))}</span></div>` : ''}
    </div>`;
  });

  // ===== 동기부여 메시지 =====
  let motMsg = '';
  if (highestAchievable >= 3) {
    motMsg = `🔥 현재 페이스라면 Stage 4(${customPct2}% 성장)까지 달성 가능! 최고의 달입니다!`;
  } else if (highestAchievable >= 2) {
    motMsg = `💪 좋은 페이스! Stage 3(${customPct1}% 성장) 달성이 보입니다. 조금만 더 힘내세요!`;
  } else if (highestAchievable >= 1) {
    motMsg = `👍 5% 성장 달성 페이스 유지 중! 꾸준히 이어가면 더 높은 단계도 가능합니다.`;
  } else if (highestAchievable >= 0) {
    motMsg = `📌 작년 동월 달성이 목표입니다. 현재 페이스를 유지하세요!`;
  } else {
    motMsg = `⚡ 아직 시작 단계입니다. 매일 ${fmtMan(tyAvg)} 페이스를 올려보세요!`;
  }

  html += `<div style="background:#FAEEDA;border:1.5px solid #FDE68A;border-radius:12px;padding:16px 18px;margin-top:4px;text-align:center">
    <div style="font-size:14px;font-weight:700;color:#92400E;line-height:1.6">${motMsg}</div>
    <div style="font-size:12px;color:#B45309;margin-top:6px">현재 일평균 ${fmtMan(tyAvg)} · 작년 일평균 ${fmtMan(lyAvg)}</div>
  </div>`;

  el.innerHTML = html;
  runCountUp(el);
  renderDirectorChart();
}

function renderDirectorChart() {
  if (directorMonthlyData && directorMonthlyData.length > 0) {
    if (chartInstances.director) chartInstances.director.destroy();
    chartInstances.director = createStockChart('directorChart',
      directorMonthlyData.map(m => m.month),
      directorMonthlyData.map(m => m.totalRevenue),
      {
        color: '#5B9BD5',
        yFormat: v => (v/1e8).toFixed(1) + '억', tipFormat: v => fmtWon(v), label: '매출',
      }
    );
  }
}

function calcRemainDays() {
  const total = parseInt(document.getElementById('stTotalDays')?.value) || 0;
  const elapsed = parseInt(document.getElementById('stTyElapsed')?.value) || 0;
  const remainEl = document.getElementById('stTyRemain');
  if (remainEl) remainEl.value = Math.max(total - elapsed, 0);
}

async function saveSalesTarget(year, month) {
  const lyDays = parseInt(document.getElementById('stLyDays').value);
  const tyElapsed = parseInt(document.getElementById('stTyElapsed').value);
  const tyRemain = parseInt(document.getElementById('stTyRemain').value);

  if (!lyDays || !tyElapsed || tyRemain == null) {
    alert('영업일수를 입력해 주세요.');
    return;
  }

  try {
    await api('/sales-target/' + year + '/' + month, {
      method: 'PUT',
      body: JSON.stringify({ lyDays, tyElapsed, tyRemain }),
    });
    alert('영업일수 저장 완료!');
    loadDirectorData();
  } catch (e) {
    alert('저장 실패: ' + e.message);
  }
}

function initItemOrderDrag() {
  const list = document.getElementById('itemOrderList');
  if (!list) return;
  let dragEl = null;
  list.querySelectorAll('.order-item').forEach(item => {
    item.addEventListener('dragstart', e => { dragEl = item; item.style.opacity = '0.4'; });
    item.addEventListener('dragend', () => { dragEl.style.opacity = '1'; dragEl = null; list.querySelectorAll('.order-item').forEach(i => i.style.borderTop = ''); });
    item.addEventListener('dragover', e => { e.preventDefault(); if (dragEl && item !== dragEl) item.style.borderTop = '2px solid #7C3AED'; });
    item.addEventListener('dragleave', () => { item.style.borderTop = ''; });
    item.addEventListener('drop', e => {
      e.preventDefault(); item.style.borderTop = '';
      if (dragEl && item !== dragEl) list.insertBefore(dragEl, item);
    });
  });
  // 터치 지원
  let touchEl = null, placeholder = null;
  list.addEventListener('touchstart', e => {
    const item = e.target.closest('.order-item');
    if (!item) return;
    touchEl = item;
    item.style.opacity = '0.4';
  }, {passive: true});
  list.addEventListener('touchmove', e => {
    if (!touchEl) return;
    e.preventDefault();
    const touch = e.touches[0];
    const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.order-item');
    list.querySelectorAll('.order-item').forEach(i => i.style.borderTop = '');
    if (target && target !== touchEl) target.style.borderTop = '2px solid #7C3AED';
    placeholder = target;
  }, {passive: false});
  list.addEventListener('touchend', () => {
    if (touchEl) {
      touchEl.style.opacity = '1';
      if (placeholder && placeholder !== touchEl) list.insertBefore(touchEl, placeholder);
      list.querySelectorAll('.order-item').forEach(i => i.style.borderTop = '');
      touchEl = null; placeholder = null;
    }
  });
}

async function uploadExcel(input) {
  const file = input.files[0];
  if (!file) return;
  const uploadMonthEl = document.getElementById('uploadMonth') || document.getElementById('teamUploadMonth');
  if (!uploadMonthEl || !uploadMonthEl.value) {
    alert('날짜를 먼저 설정해주세요');

  }
  let resultEl = input.closest('.upload-area, .upload-compact')?.nextElementSibling;

  if (resultEl) resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>업로드 중...</div>';
  const formData = new FormData();
  formData.append('file', file);
  formData.append('month', toKrMonth(uploadMonthEl.value));
  formData.append('dataDate', uploadMonthEl.value);
  try {
    const res = await fetch(API + '/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || '업로드 실패');

    // 업로드 성공 메시지만 표시
    let ph = `<div style="background:#E1F5EE;border-radius:12px;padding:24px;text-align:center">
      <div style="font-size:28px;margin-bottom:8px">✅</div>
      <div style="color:#1D9E75;font-weight:700;font-size:15px">업로드 성공</div>
      <div style="color:#888780;font-size:13px;margin-top:6px">${data.month} 데이터가 반영되었습니다</div>
    </div>`;

    if (resultEl) resultEl.innerHTML = ph;
    teamMonthlyData = null; managerMonthlyData = null; directorMonthlyData = null;
  } catch (e) {
    if (resultEl) resultEl.innerHTML = `<div class="card" style="background:var(--red-light)"><p style="color:var(--red);font-weight:600">업로드 실패</p><p style="font-size:13px;margin-top:8px">${e.message}</p></div>`;

function toKrMonth(isoDate) {
  // "2026-03-14" → "26년 3월" (월만 추출, 인센티브 계산용)
  const parts = isoDate.split('-');
  return parts[0].slice(2) + '년 ' + parseInt(parts[1]) + '월';
}
function toKrDate(isoDate) {
  // "2026-03-14" → "26년 3월 14일"
  const [y, m, d] = isoDate.split('-');
  return y.slice(2) + '년 ' + parseInt(m) + '월 ' + parseInt(d) + '일';
}

async function loadQtyHistory() {
  const el = document.getElementById('qtyHistoryTable');
  if (!el) return;
  try {
    const resp = await api('/team/item-qty-history');
    // 새 API: { history: [...], targets: { "26년 3월": {brake_oil: 40, ...}, ... } }
    const historyData = resp.history || resp; // 하위호환
    const allTargets = resp.targets || {};
    const months = Array.isArray(historyData) ? historyData.map(d => d.month) : [];
    const itemKeys = Object.keys(ITEM_LABELS);

    // 선택된 월
    const raw = document.getElementById('minQtyMonth').value;
    const selMonth = raw ? toKrMonth(raw) : null;
    const existingTargets = (selMonth && allTargets[selMonth]) ? allTargets[selMonth] : {};

    // 이전 월
    let prevMonthLabel = '';
    let prevTargets = {};
    if (raw) {
      const [y, m] = raw.split('-');
      const prevDate = new Date(Number(y), Number(m) - 2, 1);
      const prevIso = prevDate.getFullYear() + '-' + String(prevDate.getMonth()+1).padStart(2,'0');
      prevMonthLabel = toKrMonth(prevIso);
      prevTargets = allTargets[prevMonthLabel] || {};
    }

    const hasPrev = Object.values(prevTargets).some(v => v > 0);
    let h = `<div style="overflow-x:auto"><table class="data-table" style="font-size:12px"><thead><tr><th>품목</th>`;
    months.forEach(m => {
      h += `<th class="num">${m}</th>`;
    });
    if (hasPrev) h += `<th class="num" style="background:#FFF7ED;color:#BA7517;font-weight:700;font-size:11px">${prevMonthLabel}<br>설정</th>`;
    h += `<th class="num" style="background:#F3F0FF;color:#7C3AED;font-weight:700">${selMonth || ''}<br>최소수량</th></tr></thead><tbody>`;
    itemKeys.forEach(key => {
      h += `<tr><td style="font-weight:600;white-space:nowrap">${ITEM_LABELS[key]}</td>`;
      months.forEach(m => {
        const md = Array.isArray(historyData) ? historyData.find(d => d.month === m) : null;
        const qty = md && md.items[key] ? md.items[key] : 0;
        h += `<td class="num" style="${qty > 0 ? 'font-weight:600;color:#7C3AED' : 'color:#ccc'}">${qty}</td>`;
      });
      if (hasPrev) {
        const pv = prevTargets[key] || 0;
        h += `<td class="num" style="background:#FFFBF5;${pv > 0 ? 'font-weight:600;color:#BA7517' : 'color:#ccc'}">${pv}</td>`;
      }
      const existVal = existingTargets[key] || 0;
      h += `<td class="num" style="background:#F9F5FF"><input type="number" min="0" value="${existVal}" id="minqty-${key}" style="width:55px;text-align:center;border:1px solid #D4B4FE;border-radius:6px;padding:4px;font-size:13px;font-weight:600;font-family:'Noto Sans KR'"></td>`;
      h += '</tr>';
    });
    h += '</tbody></table></div>';
    el.innerHTML = h;
  } catch (e) { el.innerHTML = '<p style="font-size:13px;color:var(--red)">수량 이력 로드 실패: ' + e.message + '</p>'; }
}

    el.innerHTML = html;
  } catch { el.innerHTML = '<p style="color:var(--text-muted);font-size:13px">이력 로드 실패</p>'; }

}

async function deleteMapping(id, code) {
  if (!confirm(`매핑 "${code}"을(를) 삭제하시겠습니까?`)) return;
  try {
    await api('/mapping/' + id, { method: 'DELETE' });
    loadMappings();
  } catch (e) { alert('삭제 실패: ' + e.message); }
}

// ===== 전월 목표 복사 =====
async function copyPrevTargets() {
  const raw = document.getElementById('minQtyMonth').value;
  if (!raw) { alert('대상 월을 선택하세요'); return; }
  const [y, m] = raw.split('-');
  const prevDate = new Date(Number(y), Number(m) - 2, 1);
  const prevIso = prevDate.getFullYear() + '-' + String(prevDate.getMonth()+1).padStart(2,'0');
  const prevMonth = toKrMonth(prevIso);
  try {
    const resp = await api('/team/item-qty-history');
    const allTargets = resp.targets || {};
    const prev = allTargets[prevMonth] || {};
    if (Object.keys(prev).length === 0 || !Object.values(prev).some(v => v > 0)) { alert(prevMonth + ' 설정된 최소수량이 없습니다'); return; }
    Object.keys(ITEM_LABELS).forEach(key => {
      const input = document.getElementById('minqty-' + key);
      if (input && prev[key]) input.value = prev[key];
    });
    const resultEl = document.getElementById('minQtyResult');
    if (resultEl) resultEl.innerHTML = `<span style="color:var(--purple);font-size:13px;font-weight:600">${prevMonth} 데이터를 복사했습니다. 저장 버튼을 눌러주세요.</span>`;
  } catch (e) { alert('전월 데이터 로드 실패: ' + e.message); }
}

function showChangePw() {
  document.getElementById('pwModal').style.display = 'flex';
  document.getElementById('pwCurrent').value = '';
  document.getElementById('pwNew').value = '';
  document.getElementById('pwConfirm').value = '';
  document.getElementById('pwError').textContent = '';
}
function closePwModal() { document.getElementById('pwModal').style.display = 'none'; }
async function doChangePw() {
  const cur = document.getElementById('pwCurrent').value;
  const nw = document.getElementById('pwNew').value;
  const cf = document.getElementById('pwConfirm').value;
  const err = document.getElementById('pwError');
  if (!cur || !nw || !cf) { err.textContent = '모든 항목을 입력하세요'; return; }
  if (nw !== cf) { err.textContent = '새 비밀번호가 일치하지 않습니다'; return; }
  if (nw.length < 4) { err.textContent = '비밀번호는 4자 이상이어야 합니다'; return; }
  try {
    await api('/auth/change-password', { method: 'PUT', body: JSON.stringify({ currentPassword: cur, newPassword: nw }) });
    alert('비밀번호가 변경되었습니다. 다시 로그인해주세요.');
    closePwModal(); doLogout();
  } catch (e) { err.textContent = e.message.includes('401') ? '현재 비밀번호가 올바르지 않습니다' : '변경 실패'; }
}

document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginId').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPw').focus(); });

if (token) { initApp(); }
</script>
