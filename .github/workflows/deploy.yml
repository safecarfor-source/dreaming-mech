name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd /home/ubuntu/dreaming-mech
            git pull origin main
            docker compose -f docker-compose.prod.yml build --no-cache backend frontend
            docker compose -f docker-compose.prod.yml up -d backend frontend
            echo "Waiting for backend health..."
            for i in $(seq 1 30); do
              if docker inspect --format='{{.State.Health.Status}}' dreaming-mech-backend 2>/dev/null | grep -q healthy; then
                echo "Backend healthy!"
                break
              fi
              sleep 2
            done
            if [ -d gd-sync ]; then
              cp gd-sync/gd_sync_server.py /home/ubuntu/gd-sync/gd_sync_server.py
              echo "gd_sync_server.py synced"
            fi
            docker image prune -af
            echo "Deploy complete!"
