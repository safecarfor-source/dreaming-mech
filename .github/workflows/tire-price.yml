name: 铆聝聙矛聺麓矛聳麓 锚掳聙锚虏漏 铆聛卢毛隆陇毛搂聛

on:
  schedule:
    - cron: '0 18 * * *'  # 毛搂陇矛聺录 KST 03:00 (UTC 18:00)
  workflow_dispatch:       # 矛聢聵毛聫聶 矛聥陇铆聳聣 毛虏聞铆聤录

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 矛陆聰毛聯聹 矛虏麓铆聛卢矛聲聞矛聸聝
        uses: actions/checkout@v4

      - name: Python 3.11 矛聞陇矛聽聲
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tire-price/requirements.txt

      - name: 铆聦篓铆聜陇矛搂聙 矛聞陇矛鹿聵
        working-directory: tire-price
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: 矛聞聹毛鹿聞矛聤陇 锚鲁聞矛聽聲 JSON 铆聦聦矛聺录 矛聝聺矛聞卤
        working-directory: tire-price
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: EC2 SSH 铆聞掳毛聞聬 矛聞陇矛聽聲 (DB 矛聽聭矛聠聧矛職漏)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 13.209.143.155 >> ~/.ssh/known_hosts
          # 毛掳卤锚路赂毛聺录矛職麓毛聯聹 铆聞掳毛聞聬: localhost:5432 芒聠聮 EC2 Docker postgres:5432
          ssh -i ~/.ssh/id_rsa -f -N \
            -L 5432:172.18.0.4:5432 \
            ubuntu@13.209.143.155
          sleep 2
          echo "SSH 铆聞掳毛聞聬 矛聴掳锚虏掳 矛聶聞毛拢聦"

      - name: 铆聝聙矛聺麓矛聳麓 锚掳聙锚虏漏 铆聛卢毛隆陇毛搂聛 矛聥陇铆聳聣
        working-directory: tire-price
        env:
          TIRE_DB_NAME: ${{ secrets.TIRE_DB_NAME }}
          TIRE_DB_USER: ${{ secrets.TIRE_DB_USER }}
          TIRE_DB_PASSWORD: ${{ secrets.TIRE_DB_PASSWORD }}
          TIRE_DB_HOST: localhost
          TIRE_DB_PORT: 5432
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: service-account.json
        run: python main.py

      - name: 矛聞聹毛鹿聞矛聤陇 锚鲁聞矛聽聲 JSON 矛聜颅矛聽聹 (毛鲁麓矛聲聢)
        if: always()
        working-directory: tire-price
        run: rm -f service-account.json
